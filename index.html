<style>
/* ── CSS variables (dark default) ── */
:root {
  --bg:        #030712;
  --bg-card:   #111827;
  --bg-nav:    #0d1117;
  --bg-subtle: #1f2937;
  --border:    #1f2937;
  --border-hi: #374151;
  --text:      #e5e7eb;
  --muted:     #6B7280;
  --dim:       #4B5563;
}
[data-theme="light"] {
  --bg:        #f1f5f9;
  --bg-card:   #ffffff;
  --bg-nav:    #ffffff;
  --bg-subtle: #f1f5f9;
  --border:    #e2e8f0;
  --border-hi: #cbd5e1;
  --text:      #0f172a;
  --muted:     #64748b;
  --dim:       #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; transition: background 0.2s, color 0.2s; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
table { border-spacing: 0; border-collapse: collapse; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-subtle); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

/* ── Animations ── */
@keyframes pulse-dot {
  0%, 100% { transform: scale(1);    opacity: 1; }
  50%       { transform: scale(0.7); opacity: 0.4; }
}
@keyframes urgent-border {
  0%, 100% { box-shadow: 0 0 0 0   rgba(239,68,68,0.5); }
  50%       { box-shadow: 0 0 20px 4px rgba(239,68,68,0.2); }
}
.pulse-dot {
  display: inline-block; width: 9px; height: 9px;
  background: #EF4444; border-radius: 50%;
  animation: pulse-dot 1.1s ease-in-out infinite; flex-shrink: 0;
}
.urgent-glow { animation: urgent-border 2s ease-in-out infinite; }

/* ── Layout grid classes ── */
.grid-kpi    { display: grid; gap: 8px; }
.grid-2col   { display: grid; gap: 16px; }
.form-grid   { display: grid; gap: 12px; }
.kanban      { display: grid; gap: 10px; overflow-x: auto; }
.table-scroll { overflow-x: auto; border-radius: 12px; -webkit-overflow-scrolling: touch; }

/* ── Navigation ── */
.nav-inner {
  display: flex; align-items: center; gap: 12px; height: 52px;
  max-width: 1200px; margin: 0 auto;
}
.nav-tabs {
  display: flex; gap: 2px; flex: 1;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; padding-bottom: 4px;
}
@media (min-width: 769px) {
  .nav-tabs { scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
}
.nav-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Sub-navigation: always a single scrollable row ── */
.subnav-row {
  display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; border-bottom: 1px solid var(--border);
  padding-bottom: 8px; margin-bottom: 16px;
}
.subnav-row::-webkit-scrollbar { display: none; }
.subnav-btn { flex-shrink: 0; white-space: nowrap; }

/* ── Modal ── */
.modal-box {
  background: var(--bg-card); border: 1px solid var(--border-hi); border-radius: 16px;
  padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
}
.modal-box.wide { max-width: 720px; }

/* ── Toast notifications ── */
.toast-stack {
  position: fixed; right: 16px; bottom: 16px; z-index: 1200;
  display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
}
.toast-card { min-width: 260px; max-width: 320px; border-radius: 14px; padding: 12px 14px; box-shadow: 0 18px 40px rgba(0,0,0,0.2); }

/* ── Desktop (≥769px) ── */
@media (min-width: 769px) {
  .grid-kpi-top    { grid-template-columns: repeat(4, 1fr); }
  .grid-kpi-bottom { grid-template-columns: repeat(4, 1fr); }
  .grid-2col       { grid-template-columns: 1fr 1fr; }
  .grid-3col       { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid       { grid-template-columns: 1fr 1fr; }
  .kanban-5        { grid-template-columns: repeat(5, minmax(180px, 1fr)); }
  .kanban-4        { grid-template-columns: repeat(4, minmax(200px, 1fr)); }
}

/* ── Mobile (≤768px) ── */
@media (max-width: 768px) {
  /* Grids */
  .grid-kpi-top, .grid-kpi-bottom { grid-template-columns: repeat(2, 1fr); }
  .grid-2col, .grid-3col          { grid-template-columns: 1fr; }
  .form-grid                       { grid-template-columns: 1fr; }
  .form-full                       { grid-column: 1 / -1 !important; }
  .kanban-5, .kanban-4             { grid-auto-flow: column; grid-auto-columns: min(90vw, 300px); }
  .hide-mobile                     { display: none !important; }
  .nav-brand p:last-child          { display: none; }

  /* Nav: 2-row layout — tabs drop to their own full-width row */
  .nav-inner    { flex-wrap: wrap; height: auto; padding: 6px 0 0; gap: 0; }
  .nav-tabs     { order: 2; width: 100%; padding: 4px 0 8px; flex: none; }
  .nav-controls { gap: 6px; }

  /* Modal: tighter fit, safe inset */
  .modal-box      { padding: 16px; border-radius: 12px; max-height: 88vh; max-width: calc(100vw - 24px); }
  .modal-box.wide { max-width: calc(100vw - 24px); }

  /* Toast: stretch full width with safe insets */
  .toast-stack { left: 8px; right: 8px; bottom: 8px; align-items: stretch; }
  .toast-card  { min-width: unset; max-width: 100%; }

  /* Tables: smaller cells, always nowrap so horizontal scroll is intentional */
  .table-scroll table { font-size: 12px; }
  .table-scroll th    { padding: 8px 6px; font-size: 10px; white-space: nowrap; }
  .table-scroll td    { padding: 8px 6px; white-space: nowrap; }

  /* Touch targets */
  button         { min-height: 40px; }
  input, select  { min-height: 44px; font-size: 16px; } /* 16px prevents iOS auto-zoom */
  textarea       { font-size: 16px; }

  /* Priority task items */
  .priority-item { padding: 10px 12px !important; gap: 10px !important; }
}
</style>
</head>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const TODAY = new Date().toISOString().split('T')[0];

const SUPABASE_URL = "https://xhgaplwhsvzcqebfpfux.supabase.co";
const SUPABASE_KEY = "sb_publishable_FzW0IthgtViSKHyNEnCIeQ_MPt1_Jlj";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function syncRows(table, next, prev) {
  try {
    if (next.length > 0) await sb.from(table).upsert(next.map(r => ({ id: String(r.id), data: r })));
    const nextIds = new Set(next.map(r => String(r.id)));
    const gone = (prev||[]).map(r => String(r.id)).filter(id => !nextIds.has(id));
    if (gone.length) await sb.from(table).delete().in("id", gone);
  } catch(e) { console.error("syncRows", table, e.message); }
}

function daysUntil(dateStr) {
  if (!dateStr) return 999;
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}
function daysUntilColor(d) { return d < 0 ? "#EF4444" : d <= 30 ? "#EF4444" : d <= 60 ? "#F59E0B" : "#10B981"; }
function daysLabel(d) { return d < 0 ? Math.abs(d)+"d EXPIRED" : d === 0 ? "TODAY" : d+"d left"; }
function statusColor(s) {
  return { delivered:"#10B981","in-transit":"#3B82F6","picked-up":"#F59E0B",pending:"#6B7280",assigned:"#8B5CF6",invoiced:"#06B6D4",paid:"#10B981" }[s] || "#6B7280";
}

// ── shared UI ──
function Badge({ label, color, small }) {

}
function Card({ children, style }) {
  return <div style={{ background:"var(--bg-card)", borderRadius:12, border:"1px solid var(--border)", padding:16, ...style }}>{children}</div>;
}
function Modal({ title, onClose, children, wide }) {

        </div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <div style={{ marginBottom:12 }}>
    <label style={{ fontSize:11, color:"var(--muted)", display:"block", marginBottom:4, fontWeight:700 }}>{label}</label>
    {children}
  </div>;
}
const inp = { width:"100%", background:"var(--bg-subtle)", border:"1px solid var(--border-hi)", borderRadius:8, padding:"8px 12px", fontSize:13, color:"var(--text)", outline:"none", boxSizing:"border-box" };

// ── local storage hook ──
function useLs(key, init) {
  const [s, setS] = useState(() => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; } });
  const set = useCallback(v => setS(prev => { const next = typeof v==="function"?v(prev):v; try { localStorage.setItem(key, JSON.stringify(next)); } catch {} return next; }), [key]);
  return [s, set];
}

// ── initial data (empty — all real data entered by user) ──
const DRIVERS0  = [];
const LOADS0    = [];
const CONTACTS0 = [];
const TASKS0 = [

// ════════════════════════════════════════
//  APP — auth gate
// ════════════════════════════════════════
function App() {
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setAuthReady(true); });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (!authReady) return (
    <div style={{ minHeight:"100vh", background:"#030712", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <p style={{ color:"#6B7280", fontSize:14 }}>Connecting…</p>
    </div>
  );
  if (!session) return <LoginPage />;
  const isAdmin = session.user?.user_metadata?.role === "admin";
  return <Dashboard session={session} isAdmin={isAdmin} />;
}

// ════════════════════════════════════════
//  LOGIN PAGE  (invite-only — no public signup)
// ════════════════════════════════════════
function LoginPage() {
  const [mode, setMode] = useState("login"); // "login" | "request"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [fullName, setFullName] = useState("");
  const [roleReq, setRoleReq] = useState("Staff");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const iStyle = { width:"100%", background:"#1f2937", border:"1px solid #374151", color:"#e5e7eb", borderRadius:8, padding:"10px 12px", fontSize:14, outline:"none", boxSizing:"border-box" };

  async function submitLogin(e) {
    e.preventDefault(); setBusy(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) setErr(error.message);
    setBusy(false);
  }

  async function submitRequest(e) {
    e.preventDefault(); setBusy(true); setErr("");
    // Check for duplicate requests
    const { data: existing } = await sb.from("user_requests").select("id,status").eq("email", email.trim().toLowerCase()).maybeSingle();
    if (existing) {
      setErr(existing.status === "pending"
        ? "⏳ A request for this email is already pending admin review."
        : existing.status === "approved"
          ? "✅ Your request was approved — check your email for login instructions."
          : "❌ Your request was previously rejected. Contact an admin directly.");
      setBusy(false); return;
    }
    const { error } = await sb.from("user_requests").insert({
      email: email.trim().toLowerCase(),
      full_name: fullName.trim(),
      role_requested: roleReq,
      status: "pending",
    });
    if (error) setErr(error.message);
    else setErr("✅ Request submitted! An admin will review and contact you shortly.");
    setBusy(false);
  }

  return (
    <div style={{ minHeight:"100vh", background:"#030712", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:48, marginBottom:8 }}>🚛</div>
          <p style={{ color:"#e5e7eb", fontWeight:900, fontSize:22 }}>Elite Trucking Lanes</p>
          <p style={{ color:"#6B7280", fontSize:13, marginTop:4 }}>HQ Dashboard · Invite Only</p>
        </div>

        <div style={{ background:"#111827", border:"1px solid #1f2937", borderRadius:16, padding:28 }}>
          {mode === "login" ? (
            <>
              <p style={{ color:"#e5e7eb", fontWeight:700, fontSize:15, marginBottom:20, textAlign:"center" }}>Sign in to your account</p>
              <form onSubmit={submitLogin}>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:5, fontWeight:700 }}>EMAIL</label>
                  <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={iStyle} />
                </div>
                <div style={{ marginBottom:20 }}>
                  <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:5, fontWeight:700 }}>PASSWORD</label>
                  <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" style={iStyle} />
                </div>
                {err && <p style={{ color:"#EF4444", fontSize:12, marginBottom:14, textAlign:"center" }}>{err}</p>}
                <button type="submit" disabled={busy}
                  style={{ width:"100%", padding:"11px 0", background:busy?"#1e3a5f":"#1d4ed8", border:"none", color:"#fff", borderRadius:8, fontWeight:700, fontSize:14, cursor:busy?"not-allowed":"pointer" }}>
                  {busy ? "Please wait…" : "Sign In"}
                </button>
              </form>
              <p style={{ textAlign:"center", marginTop:18, fontSize:12, color:"#6B7280" }}>
                Don't have access?{" "}
                <span onClick={()=>{ setMode("request"); setErr(""); }} style={{ color:"#3B82F6", cursor:"pointer", fontWeight:700 }}>Request Access</span>
              </p>
            </>
          ) : (
            <>
              <p style={{ color:"#e5e7eb", fontWeight:700, fontSize:15, marginBottom:6, textAlign:"center" }}>Request Access</p>
              <p style={{ color:"#6B7280", fontSize:12, marginBottom:20, textAlign:"center", lineHeight:1.5 }}>
                This dashboard is invite-only. Submit your info and an admin will review your request.
              </p>
              <form onSubmit={submitRequest}>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:5, fontWeight:700 }}>FULL NAME</label>
                  <input type="text" required value={fullName} onChange={e=>setFullName(e.target.value)} placeholder="Your full name" style={iStyle} />
                </div>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:5, fontWeight:700 }}>EMAIL</label>
                  <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={iStyle} />
                </div>
                <div style={{ marginBottom:20 }}>
                  <label style={{ fontSize:11, color:"#6B7280", display:"block", marginBottom:5, fontWeight:700 }}>ROLE REQUESTED</label>
                  <select required value={roleReq} onChange={e=>setRoleReq(e.target.value)} style={iStyle}>
                    {["Dispatch","Recruiting","Shipper Outreach","Compliance","Finance","Staff"].map(r => <option key={r}>{r}</option>)}
                  </select>
                </div>
                {err && <p style={{ color:err.startsWith("✅")?"#10B981":err.startsWith("⏳")?"#F59E0B":"#EF4444", fontSize:12, marginBottom:14, textAlign:"center" }}>{err}</p>}
                <button type="submit" disabled={busy}
                  style={{ width:"100%", padding:"11px 0", background:busy?"#1e3a5f":"#1d4ed8", border:"none", color:"#fff", borderRadius:8, fontWeight:700, fontSize:14, cursor:busy?"not-allowed":"pointer" }}>
                  {busy ? "Submitting…" : "Submit Request"}
                </button>
              </form>
              <p style={{ textAlign:"center", marginTop:18, fontSize:12, color:"#6B7280" }}>
                Already have access?{" "}
                <span onClick={()=>{ setMode("login"); setErr(""); }} style={{ color:"#3B82F6", cursor:"pointer", fontWeight:700 }}>Sign In</span>
              </p>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════
//  TASK ALERT MODAL
// ════════════════════════════════════════
function TaskAlertModal({ priorityTasks, setPriorityTasks, onClose }) {
  const urgent = priorityTasks.filter(function(t){ return t.priority==="urgent" && !t.done; });
  const asap   = priorityTasks.filter(function(t){ return t.priority==="asap"   && !t.done; });

  function markDone(id) {
    setPriorityTasks(function(prev){ return prev.map(function(x){ return x.id===id ? Object.assign({},x,{done:true}) : x; }); });
  }

  function renderTask(t, accentColor, bgColor, borderColor) {
    return (
      <div key={t.id} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"12px 14px", borderRadius:10, background:bgColor, border:"1px solid "+borderColor, marginBottom:8 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontWeight:700, fontSize:14, color:"#fff", marginBottom:3 }}>{t.text}</p>
          {t.deadline
            ? <p style={{ fontSize:11, color:accentColor, marginBottom:3 }}>{"📅 Due " + new Date(t.deadline+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</p>
            : null}
          {t.notes
            ? <p style={{ fontSize:11, color:"#9CA3AF", lineHeight:1.4, whiteSpace:"pre-line" }}>{t.notes}</p>
            : null}
        </div>
        <button onClick={function(){ markDone(t.id); }}
          style={{ fontSize:10, fontWeight:700, padding:"4px 10px", borderRadius:6, border:"1px solid "+borderColor, background:bgColor, color:accentColor, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>
          Mark Done
        </button>
      </div>
    );
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:1100, background:"rgba(3,7,18,0.92)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:560, borderRadius:20, background:"var(--bg-card)", padding:28, boxShadow:"0 24px 80px rgba(0,0,0,0.4)", maxHeight:"85vh", display:"flex", flexDirection:"column" }}>
        <p style={{ fontWeight:900, fontSize:20, marginBottom:20 }}>🔴 Tasks Needing Attention</p>
        <div style={{ overflowY:"auto", flex:1, marginBottom:20 }}>
          {urgent.length > 0 && (
            <div style={{ marginBottom:16 }}>
              <p style={{ fontSize:12, fontWeight:800, color:"#EF4444", letterSpacing:"0.1em", marginBottom:8 }}>🚨 URGENT — DROP EVERYTHING</p>
              {urgent.map(function(t){ return renderTask(t, "#fca5a5", "rgba(239,68,68,0.1)", "rgba(239,68,68,0.3)"); })}
            </div>
          )}
          {asap.length > 0 && (
            <div>
              <p style={{ fontSize:12, fontWeight:800, color:"#F59E0B", letterSpacing:"0.1em", marginBottom:8 }}>⚡ ASAP — NEEDS TO BE DONE TODAY</p>
              {asap.map(function(t){ return renderTask(t, "#fcd34d", "rgba(245,158,11,0.08)", "rgba(245,158,11,0.25)"); })}
            </div>
          )}
        </div>
        <button onClick={onClose}
          style={{ width:"100%", border:"none", borderRadius:12, padding:"14px 24px", background:"#1d4ed8", color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer" }}>
          Got It, Let's Work 💪
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════

  const [theme, setTheme] = useLs("etl_theme", "dark");

  const [toasts, setToasts] = useState([]);
  const isDark = theme === "dark";
  const toggleTheme = () => setTheme(isDark ? "light" : "dark");

  function pushToast(message, variant = "info") {
    const id = `toast_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    setToasts(prev => [...prev, { id, message, variant }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 6000);
  }

  // ── Initial load ──────────────────────
  useEffect(() => {
    (async () => {
      const [dr, lo, bl, co, st, pt] = await Promise.all([
        sb.from("drivers").select("*"),
        sb.from("loads").select("*"),
        sb.from("broker_loads").select("*"),
        sb.from("contacts").select("*"),
        sb.from("app_settings").select("*").eq("key","tasks"),
        sb.from("app_settings").select("*").eq("key","priority_tasks"),
      ]);
      _setDrivers(    (dr.data||[]).map(r=>r.data));
      _setLoads(      (lo.data||[]).map(r=>r.data));
      _setBrokerLoads((bl.data||[]).map(r=>r.data));
      _setContacts(   (co.data||[]).map(r=>r.data));
      // Pick the last row in case of duplicates (caused by missing onConflict in past upserts)
      const stRow = st.data && st.data.length > 0 ? st.data[st.data.length - 1] : null;
      const ptRow = pt.data && pt.data.length > 0 ? pt.data[pt.data.length - 1] : null;
      if (stRow?.value) {
        // Migrate: rename legacy "Sales" dept to "Shipper Outreach"
        let loadedTasks = stRow.value;
        const hasSales = loadedTasks.some(d => d.role === "Sales");
        if (hasSales) {
          loadedTasks = loadedTasks.map(d => d.role === "Sales" ? { ...d, role:"Shipper Outreach", emoji:"📋" } : d);
          sb.from("app_settings").upsert({ key:"tasks", value: loadedTasks }, { onConflict: "key" });
        }
        _setTasks(loadedTasks);
      }
      // Merge seed tasks: prepend missing seeds and overwrite notes/fields on existing seeds
      const loadedPT = ptRow?.value || [];
      const missingSeeds = SEED_PRIORITY_TASKS.filter(s => !loadedPT.some(t => t.id === s.id));
      const updatedPT = loadedPT.map(t => {
        const seed = SEED_PRIORITY_TASKS.find(s => s.id === t.id);
        return seed ? { ...t, notes: seed.notes, text: seed.text, deadline: seed.deadline, priority: seed.priority } : t;
      });
      const mergedPT = [...missingSeeds, ...updatedPT];
      const needsPersist = missingSeeds.length > 0 || loadedPT.some(t => {
        const seed = SEED_PRIORITY_TASKS.find(s => s.id === t.id);
        return seed && t.notes !== seed.notes;
      });
      if (needsPersist) sb.from("app_settings").upsert({ key:"priority_tasks", value: mergedPT }, { onConflict: "key" });
      _setPriorityTasks(mergedPT);
      setDbReady(true);
    })();
  }, []);

  // ── Realtime sync ─────────────────────
  useEffect(() => {
    const pull = (table, setter) => async () => {
      const { data } = await sb.from(table).select("*");
      if (data) setter(data.map(r=>r.data));
    };
    const pullTasks = async () => {
      const [st, pt] = await Promise.all([
        sb.from("app_settings").select("*").eq("key","tasks"),
        sb.from("app_settings").select("*").eq("key","priority_tasks"),
      ]);
      const stRow = st.data && st.data.length > 0 ? st.data[st.data.length - 1] : null;
      const ptRow = pt.data && pt.data.length > 0 ? pt.data[pt.data.length - 1] : null;
      if (stRow?.value) {
        const t = stRow.value.map(d => d.role === "Sales" ? { ...d, role:"Shipper Outreach", emoji:"📋" } : d);
        _setTasks(t);
      }
      if (ptRow?.value) _setPriorityTasks(ptRow.value);
    };
    const ch = sb.channel("realtime-all")
      .on("postgres_changes",{event:"*",schema:"public",table:"drivers"},      pull("drivers",     _setDrivers))
      .on("postgres_changes",{event:"*",schema:"public",table:"loads"},         pull("loads",       _setLoads))
      .on("postgres_changes",{event:"*",schema:"public",table:"broker_loads"},  pull("broker_loads",_setBrokerLoads))
      .on("postgres_changes",{event:"*",schema:"public",table:"contacts"},      pull("contacts",    _setContacts))
      .on("postgres_changes",{event:"*",schema:"public",table:"app_settings"},  pullTasks)
      .subscribe();
    return () => sb.removeChannel(ch);
  }, []);

  // ── Supabase-synced setters ───────────
  function makeSynced(table, localSetter) {
    return fn => localSetter(prev => {
      const next = typeof fn==="function" ? fn(prev) : fn;
      syncRows(table, next, prev);
      return next;
    });
  }
  const setDrivers     = makeSynced("drivers",     _setDrivers);
  const setLoads       = makeSynced("loads",        _setLoads);
  const setBrokerLoads = makeSynced("broker_loads", _setBrokerLoads);
  const setContacts    = makeSynced("contacts",     _setContacts);
  function setTasks(fn) {
    _setTasks(prev => {
      const next = typeof fn==="function" ? fn(prev) : fn;
      sb.from("app_settings").upsert({ key:"tasks", value: next }, { onConflict: "key" });
      return next;
    });
  }
  function setPriorityTasks(fn) {
    _setPriorityTasks(prev => {
      const next = typeof fn==="function" ? fn(prev) : fn;
      sb.from("app_settings").upsert({ key:"priority_tasks", value: next }, { onConflict: "key" });
      return next;
    });
  }

  // ── Computed values ───────────────────
  const ooFees = drivers.reduce((s,d) => s + Math.round(d.weekGross * 0.12), 0);
  const brokerDelivered = loads.filter(l => l.type==="broker" && l.status==="delivered");
  const brokerProfit = brokerDelivered.reduce((s,l) => s + l.rate - l.carrierPay, 0)
                     + brokerLoads.reduce((s,l) => s + (Number(l.loadRate)||0) - (Number(l.carrierRate)||0), 0);
  const totalProfit = ooFees + brokerProfit;
  const unpaidAR = loads.filter(l => l.invoiced && !l.paid).reduce((s,l) => s + l.rate, 0);

  const alerts = [];
  drivers.forEach(d => {
    const checks = [
      { type:"CDL",          days: daysUntil(d.cdlExpiry) },
      { type:"Med Card",     days: daysUntil(d.medCardExpiry) },
      { type:"Insurance",    days: daysUntil(d.insuranceExpiry) },
      { type:"Inspection",   days: daysUntil(d.inspectionExpiry) },
      { type:"Registration", days: daysUntil(d.registrationExpiry) },
    ];
    checks.forEach(({ type, days }) => {
      if (days <= 60) alerts.push({ driver:d.name, type, days, sev: days<=30?"red":"yellow" });
    });
    if (d.csa >= 65) alerts.push({ driver:d.name, type:"CSA", days:null, sev:"red", note:`Score: ${d.csa}` });
  });
  const redAlerts = alerts.filter(a => a.sev==="red");

  const urgentCount = priorityTasks.filter(t => t.priority==="urgent" && !t.done).length;
  const urgentAsapCount = priorityTasks.filter(t => ["urgent","asap"].includes(t.priority) && !t.done).length;

  const TABS = [
    { id:"overview",    label:"🏠 Overview" },
    { id:"tasks",       label:"✅ Tasks" },
    { id:"operations",  label:"📦 Loads" },
    { id:"people",      label:"🚛 Drivers" },
    { id:"finance",     label:"💰 Finance" },
    ...(isAdmin ? [{ id:"agents", label:"🤖 AI Agents" }] : []),
    ...(isAdmin ? [{ id:"admin", label:"🔐 Admin" }] : []),
  ];

  // ── Task alert modal on first load (urgent/ASAP only) ──
  useEffect(() => {
    if (!dbReady || hasSeenAlert) return;
    setHasSeenAlert(true);
    if (urgentAsapCount > 0) setShowTaskAlert(true);
  }, [dbReady, urgentAsapCount]);

  // ── 2-hour urgent task reminder toasts ──
  useEffect(() => {
    if (!dbReady) return;
    const timer = setInterval(() => {
      if (urgentCount > 0) {
        pushToast("⚠️ You have " + urgentCount + " urgent task" + (urgentCount !== 1 ? "s" : "") + " pending — elitetrucking.xyz", "info");
      }
    }, 7200000);
    return () => clearInterval(timer);
  }, [dbReady, urgentCount]);

  if (!dbReady) return (
    <div data-theme={theme} style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
      <div style={{ fontSize:32 }}>🚛</div>
      <p style={{ color:"var(--muted)", fontSize:14 }}>Loading data…</p>
    </div>
  );

  return (
    <div data-theme={theme} style={{ minHeight:"100vh", background:"var(--bg)", color:"var(--text)", fontFamily:"system-ui,sans-serif" }}>
      {showTaskAlert && React.createElement(TaskAlertModal, {
        priorityTasks: priorityTasks,
        setPriorityTasks: setPriorityTasks,
        onClose: () => setShowTaskAlert(false),
      })}
      {toasts.length > 0 && (
        <div className="toast-stack">
          {toasts.map(t => (
            <div key={t.id} className="toast-card" style={{ background:t.variant==="success"?"#0f766e":"#111827", border:`1px solid ${t.variant==="success"?"#10B981":"#0f172a"}` }}>
              <p style={{ fontSize:13, fontWeight:700, color:t.variant==="success"?"#bbf7d0":"#93c5fd", marginBottom:4 }}>{t.variant==="success"?"✅ Great news":"⏱️ Reminder"}</p>
              <p style={{ fontSize:13, color:"var(--text)", lineHeight:1.4 }}>{t.message}</p>
            </div>
          ))}
        </div>
      )}
      {/* NAV */}
      <div style={{ background:"var(--bg-nav)", borderBottom:"1px solid var(--border)", padding:"0 16px", position:"sticky", top:0, zIndex:100 }}>
        <div className="nav-inner">
          <div className="nav-brand" style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <span style={{ fontSize:22 }}>🚛</span>
            <div>
              <p style={{ fontWeight:900, fontSize:13, lineHeight:1 }}>ELITE TRUCKING</p>
              <p style={{ fontSize:9, color:"var(--dim)", letterSpacing:2 }}>LANES HQ</p>
            </div>
          </div>
          <div className="nav-tabs">
            {TABS.map(t => {
              const isActive = tab === t.id;
              const showBadge = t.id === "tasks" && urgentCount > 0;
              return (
                <button key={t.id} onClick={() => setTab(t.id)}
                  style={{ position:"relative", padding:"6px 11px", borderRadius:8, fontSize:12, fontWeight:700, border:"none", whiteSpace:"nowrap",
                    background: isActive ? "#1d4ed8" : "transparent",
                    color: isActive ? "#fff" : "var(--muted)" }}>
                  {t.label}
                  {showBadge && (
                    <span style={{ position:"absolute", top:-5, right:-5, display:"flex", alignItems:"center", gap:3,
                      background:"#EF4444", borderRadius:10, padding:"1px 5px", fontSize:10, fontWeight:900, color:"#fff" }}>
                      <span className="pulse-dot" style={{ width:5, height:5 }} />
                      {urgentCount}
                    </span>
                  )}
                </button>
              );
            })}
          </div>
          <div className="nav-controls">
            {redAlerts.length > 0 && (
              <div onClick={() => setTab("finance")} className="hide-mobile" style={{ background:"#7f1d1d", border:"1px solid #991b1b", borderRadius:8, padding:"3px 10px", cursor:"pointer" }}>
                <span style={{ color:"#fca5a5", fontSize:12, fontWeight:700 }}>⚠️ {redAlerts.length}</span>
              </div>
            )}
            <div className="hide-mobile" style={{ textAlign:"right" }}>
              <p style={{ fontSize:10, color:"var(--muted)" }}>Profit/Wk</p>
              <p style={{ fontSize:15, fontWeight:900, color:"#10B981" }}>${totalProfit.toLocaleString()}</p>
            </div>
            <div className="hide-mobile" style={{ maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              <p style={{ fontSize:10, color:"var(--muted)", overflow:"hidden", textOverflow:"ellipsis" }}>{session.user.email}</p>
            </div>
            <button onClick={toggleTheme} title={isDark ? "Switch to light mode" : "Switch to dark mode"}
              style={{ width:36, height:36, borderRadius:8, border:"1px solid var(--border-hi)", background:"var(--bg-subtle)", color:"var(--text)", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              {isDark ? "☀️" : "🌙"}
            </button>
            <button onClick={() => sb.auth.signOut()}
              style={{ padding:"6px 12px", background:"var(--bg-subtle)", border:"1px solid var(--border-hi)", color:"var(--muted)", borderRadius:8, fontSize:11, fontWeight:700, flexShrink:0 }}>
              Sign Out
            </button>
          </div>
        </div>
      </div>

      {/* RED ALERT BAR */}
      {redAlerts.length > 0 && (
        <div style={{ background:"#7f1d1d", borderBottom:"1px solid #991b1b", padding:"5px 16px" }}>
          <div style={{ maxWidth:1200, margin:"0 auto", display:"flex", gap:16, flexWrap:"wrap" }}>
            {redAlerts.map((a,i) => (
              <span key={i} style={{ fontSize:11, color:"#fca5a5" }}>
                🔴 <strong>{a.driver}</strong> — {a.type}: {a.days!=null ? daysLabel(a.days) : a.note}
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={{ maxWidth:1200, margin:"0 auto", padding:16 }}>
        {tab==="overview"   && <OverviewTab          drivers={drivers} loads={loads} tasks={tasks} ooFees={ooFees} brokerProfit={brokerProfit} totalProfit={totalProfit} unpaidAR={unpaidAR} alerts={alerts} setTab={setTab} priorityTasks={priorityTasks} setPriorityTasks={setPriorityTasks} />}
        {tab==="operations" && <OperationsTab        loads={loads} setLoads={setLoads} drivers={drivers} />}
        {tab==="people"     && <PeopleTab            drivers={drivers} setDrivers={setDrivers} contacts={contacts} setContacts={setContacts} />}
        {tab==="finance"    && <FinanceComplianceTab loads={loads} setLoads={setLoads} drivers={drivers} ooFees={ooFees} brokerProfit={brokerProfit} totalProfit={totalProfit} brokerLoads={brokerLoads} setBrokerLoads={setBrokerLoads} alerts={alerts} />}
        {tab==="tasks"      && <TasksTab             tasks={tasks} setTasks={setTasks} priorityTasks={priorityTasks} setPriorityTasks={setPriorityTasks} />}
        {tab==="agents"     && isAdmin && <AIAgentsTab />}
        {tab==="admin"      && isAdmin && <AdminTab />}
      </div>
    </div>
  );
}

// ════════════════════════════════════════
//  OVERVIEW
// ════════════════════════════════════════
function OverviewTab({ drivers, loads, tasks, ooFees, brokerProfit, totalProfit, unpaidAR, alerts, setTab, priorityTasks, setPriorityTasks }) {
  const moving = loads.filter(l => ["in-transit","picked-up","assigned"].includes(l.status));

  const activeOOs   = drivers.filter(d => d.onboardingStatus==="active" || d.status==="available" || d.status==="on-load");
  const totalGross  = drivers.reduce((s,d) => s + (Number(d.weekGross)||0), 0);
  const totalCut    = drivers.reduce((s,d) => s + Math.round((Number(d.weekGross)||0)*0.12), 0);
  const inPipeline  = drivers.filter(d => d.onboardingStatus==="lead" || d.onboardingStatus==="documents-pending").length;

  const kpis = [
    { icon:"🚛", label:"Fleet Size",         value: drivers.filter(d=>d.onboardingStatus==="active"||(!d.onboardingStatus&&d.status!=="inactive")).length, color:"#10B981", tab:"people" },
    { icon:"🔄", label:"In Pipeline",        value: inPipeline, color:"#3B82F6", tab:"people" },
    { icon:"📦", label:"Loads Moving",       value: moving.length, color:"#8B5CF6", tab:"operations" },
    { icon:"💵", label:"Fleet Gross/Wk",     value:"$"+totalGross.toLocaleString(), color:"#10B981", tab:"finance" },
    { icon:"✂️", label:"Your 12% Cut/Wk",    value:"$"+totalCut.toLocaleString(), color:"#F59E0B", tab:"finance" },
    { icon:"📈", label:"Brokerage Profit",   value:"$"+brokerProfit.toLocaleString(), color:"#F59E0B", tab:"finance" },
    { icon:"🏦", label:"Unpaid Invoices",    value:"$"+unpaidAR.toLocaleString(), color:"#EF4444", tab:"finance" },
    { icon:"✅", label:"Total Profit/Wk",    value:"$"+totalProfit.toLocaleString(), color:"#10B981", tab:"finance" },
  ];

  if (drivers.length === 0) return (
    <div>
      <TaskPriorityPanel
        priorityTasks={priorityTasks}
        setPriorityTasks={setPriorityTasks}
        tasks={tasks}
        tiersOnly={["urgent","asap"]}
        prominent
      />
      <div style={{ maxWidth:560, margin:"40px auto", textAlign:"center" }}>
      <p style={{ fontSize:48, marginBottom:16 }}>🚛</p>
      <p style={{ fontWeight:900, fontSize:22, marginBottom:8 }}>Welcome to Elite Trucking Dashboard</p>
      <p style={{ color:"var(--muted)", fontSize:14, marginBottom:32, lineHeight:1.6 }}>No data yet. Start by adding your first driver — once you have drivers and loads entered, this dashboard will show your live numbers.</p>
      <div className="grid-3col" style={{ gap:12, marginBottom:32 }}>
        {[
          { step:"1", label:"Add your driver", desc:"Name, truck, CDL, compliance docs", tab:"people", color:"#3B82F6" },
          { step:"2", label:"Log your loads", desc:"Routes, rates, shipper info", tab:"operations", color:"#10B981" },
          { step:"3", label:"Track finances", desc:"Settlements, invoices, A/R", tab:"finance", color:"#F59E0B" },
        ].map(s => (
          <div key={s.step} onClick={() => setTab(s.tab)} style={{ background:"var(--bg-card)", border:`1px solid ${s.color}44`, borderRadius:12, padding:16, cursor:"pointer" }}
            onMouseEnter={e => e.currentTarget.style.borderColor = s.color}
            onMouseLeave={e => e.currentTarget.style.borderColor = s.color+"44"}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:s.color+"22", color:s.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:14, margin:"0 auto 8px" }}>{s.step}</div>
            <p style={{ fontWeight:700, fontSize:13, marginBottom:4 }}>{s.label}</p>
            <p style={{ color:"var(--muted)", fontSize:11 }}>{s.desc}</p>
          </div>
        ))}
      </div>
      <button onClick={() => setTab("people")} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"12px 28px", borderRadius:10, fontWeight:700, fontSize:15 }}>+ Add Your First Driver →</button>
    </div>
    </div>
  );

  return (
    <div>
      {/* ══ PRIORITY TASK BANNER — first thing visible ══ */}
      <TaskPriorityPanel
        priorityTasks={priorityTasks}
        setPriorityTasks={setPriorityTasks}
        tasks={tasks}
        tiersOnly={["urgent","asap"]}
        prominent
      />

      <div className="grid-kpi-top" style={{ marginBottom:8 }}>
        {kpis.slice(0,4).map((k,i) => (
          <div key={i} onClick={() => setTab(k.tab)} style={{ background:"var(--bg-card)", borderRadius:12, border:"1px solid var(--border)", padding:12, cursor:"pointer" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor=k.color; e.currentTarget.style.transform="translateY(-2px)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor="var(--border)"; e.currentTarget.style.transform="translateY(0)"; }}>
            <p style={{ fontSize:20, marginBottom:4 }}>{k.icon}</p>
            <p style={{ color:"var(--muted)", fontSize:10 }}>{k.label}</p>
            <p style={{ color:k.color, fontSize:20, fontWeight:900, marginTop:2 }}>{k.value}</p>
          </div>
        ))}
      </div>
      <div className="grid-kpi-bottom" style={{ marginBottom:16 }}>
        {kpis.slice(4).map((k,i) => (
          <div key={i} onClick={() => setTab(k.tab)} style={{ background:"var(--bg-card)", borderRadius:12, border:"1px solid var(--border)", padding:12, cursor:"pointer" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor=k.color; e.currentTarget.style.transform="translateY(-2px)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor="var(--border)"; e.currentTarget.style.transform="translateY(0)"; }}>
            <p style={{ fontSize:20, marginBottom:4 }}>{k.icon}</p>
            <p style={{ color:"var(--muted)", fontSize:10 }}>{k.label}</p>
            <p style={{ color:k.color, fontSize:20, fontWeight:900, marginTop:2 }}>{k.value}</p>
          </div>
        ))}
      </div>

      {/* ── Revenue & Active Loads ── */}
      <div className="grid-2col" style={{ marginBottom:16 }}>
        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>💰 This Week's Revenue</p>
          <div className="grid-2col" style={{ gap:8, marginBottom:8 }}>
            <div style={{ background:"#064e3b", borderRadius:8, padding:10, textAlign:"center" }}>
              <p style={{ color:"var(--muted)", fontSize:10 }}>OO Dispatch Fees</p>
              <p style={{ color:"#10B981", fontSize:22, fontWeight:900 }}>${ooFees.toLocaleString()}</p>
              <p style={{ color:"#065f46", fontSize:10 }}>{drivers.filter(d=>d.weekGross>0).length} drivers × 12%</p>
            </div>
            <div style={{ background:"#431407", borderRadius:8, padding:10, textAlign:"center" }}>
              <p style={{ color:"var(--muted)", fontSize:10 }}>Brokerage Margins</p>
              <p style={{ color:"#F59E0B", fontSize:22, fontWeight:900 }}>${brokerProfit.toLocaleString()}</p>
              <p style={{ color:"#7c2d12", fontSize:10 }}>{loads.filter(l=>l.type==="broker"&&l.status==="delivered").length} loads brokered</p>
            </div>
          </div>
          <div style={{ background:"var(--bg-subtle)", borderRadius:8, padding:10, textAlign:"center" }}>
            <p style={{ color:"var(--muted)", fontSize:10 }}>TOTAL WEEKLY PROFIT</p>
            <p style={{ color:"#10B981", fontSize:28, fontWeight:900 }}>${totalProfit.toLocaleString()}</p>
            <p style={{ color:"var(--dim)", fontSize:10, marginTop:2 }}>≈ ${(totalProfit*4.3).toLocaleString()}/mo · ${Math.round(totalProfit/5).toLocaleString()} per partner</p>
          </div>
        </Card>
        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>🚛 Active Loads</p>
          {moving.length === 0 && <p style={{ color:"var(--muted)", fontSize:13 }}>No active loads right now.</p>}
          {moving.map(l => (
            <div key={l.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid var(--border)" }}>
              <Badge label={l.status} color={statusColor(l.status)} small />
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{l.origin} → {l.dest}</p>
                <p style={{ fontSize:11, color:"var(--muted)" }}>{l.type==="oo" ? l.driver : (l.carrier||"Carrier TBD")}</p>
              </div>
              <p style={{ fontSize:13, fontWeight:700, color:"#10B981" }}>${l.rate.toLocaleString()}</p>
            </div>
          ))}
        </Card>
      </div>

      <div className="grid-2col" style={{ marginBottom:16 }}>
        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>🧑‍💼 Team Progress Today</p>
          {tasks.map((p,i) => {
            const done = p.tasks.filter(t=>t.done).length;
            const pct = p.tasks.length ? (done/p.tasks.length)*100 : 0;
            return (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7 }}>
                <span style={{ fontSize:14 }}>{p.emoji}</span>
                <span style={{ fontSize:12, fontWeight:700, color:p.color, width:90 }}>{p.role}</span>
                <div style={{ flex:1, height:8, background:"var(--bg-subtle)", borderRadius:4 }}>
                  <div style={{ width:pct+"%", height:8, background:p.color, borderRadius:4 }} />
                </div>
                <span style={{ fontSize:11, color:"var(--muted)", width:30, textAlign:"right" }}>{done}/{p.tasks.length}</span>
              </div>
            );
          })}
        </Card>

        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>⚠️ Compliance Alerts</p>
          {alerts.length===0 && <p style={{ color:"#10B981", fontSize:13 }}>✅ All clear — no expiring docs</p>}
          {alerts.slice(0,6).map((a,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 0", borderBottom:"1px solid var(--border)" }}>
              <span>{a.sev==="red"?"🔴":"🟡"}</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:12, fontWeight:700 }}>{a.driver}</p>
                <p style={{ fontSize:11, color:"var(--muted)" }}>{a.type}</p>
              </div>
              <span style={{ fontSize:11, fontWeight:700, color: a.sev==="red"?"#EF4444":"#F59E0B" }}>
                {a.days!=null ? daysLabel(a.days) : a.note}
              </span>
            </div>
          ))}
        </Card>
      </div>

      {/* Growth projections */}
      <Card>
        <p style={{ fontWeight:700, marginBottom:4 }}>📊 Growth Projections (OO @ $4,500/wk avg · 12% cut)</p>
        <p style={{ color:"var(--muted)", fontSize:12, marginBottom:12 }}>Current: {drivers.filter(d=>d.status!=="inactive").length} active drivers. 90-day goal: 20 OOs + brokerage.</p>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ borderBottom:"2px solid #1f2937" }}>
              {["Drivers","Weekly OO Fees","Monthly OO Fees","Per Partner","+ Brokerage/Mo","Per Partner (Full)"].map(h=>(
                <th key={h} style={{ padding:"6px 10px", color:"var(--muted)", fontSize:11, textAlign: h==="Drivers"?"left":"center" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[5,10,15,20].map(n => {
              const wk = n*540, mo = Math.round(wk*4.3), pp = Math.round(mo/5);
              const full = mo+39000, ppf = Math.round(full/5);
              const isNow = n <= drivers.filter(d=>d.status!=="inactive").length && (n+5) > drivers.filter(d=>d.status!=="inactive").length;
              return (
                <tr key={n} style={{ borderBottom:"1px solid var(--border)", background: n===20?"rgba(16,185,129,0.06)": isNow?"rgba(59,130,246,0.06)":"transparent" }}>
                  <td style={{ padding:"10px 10px", fontWeight:900 }}>{n} OOs {isNow&&<span style={{ fontSize:10, color:"#3B82F6", marginLeft:4 }}>← now</span>}</td>
                  <td style={{ textAlign:"center", color:"#10B981", fontWeight:700 }}>${wk.toLocaleString()}</td>
                  <td style={{ textAlign:"center", color:"#10B981", fontWeight:900, fontSize:15 }}>${mo.toLocaleString()}</td>
                  <td style={{ textAlign:"center", color:"#9CA3AF" }}>${pp.toLocaleString()}</td>
                  <td style={{ textAlign:"center", color:"#F59E0B", fontWeight:700 }}>${full.toLocaleString()}</td>
                  <td style={{ textAlign:"center", color: n===20?"#10B981":"#9CA3AF", fontWeight: n===20?900:400 }}>${ppf.toLocaleString()}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ════════════════════════════════════════
//  DISPATCH (Kanban)
// ════════════════════════════════════════
function DispatchTab({ loads, setLoads, drivers }) {
  const [showAdd, setShowAdd] = useState(false);

  const COLS = [
    { key:"pending",    label:"📋 Pending",    color:"var(--muted)" },
    { key:"assigned",   label:"🔵 Assigned",   color:"#8B5CF6" },
    { key:"picked-up",  label:"🟡 Picked Up",  color:"#F59E0B" },
    { key:"in-transit", label:"🚛 In Transit",  color:"#3B82F6" },
    { key:"delivered",  label:"✅ Delivered",  color:"#10B981" },
  ];

  function advance(id, curKey) {
    const idx = COLS.findIndex(c => c.key===curKey);
    if (idx < COLS.length-1) setLoads(prev => prev.map(l => l.id===id ? { ...l, status:COLS[idx+1].key } : l));
  }

  const avail = drivers.filter(d => d.status==="available");

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:16 }}>📡 Dispatch Board</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>{avail.length} available · {loads.filter(l=>["in-transit","picked-up"].includes(l.status)).length} loads moving</p>
        </div>
        <button onClick={() => setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"8px 16px", borderRadius:8, fontWeight:700, fontSize:13 }}>+ Add Load</button>
      </div>

      {avail.length > 0 && (
        <div style={{ background:"#064e3b", border:"1px solid #065f46", borderRadius:10, padding:"8px 12px", marginBottom:12, display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          <span style={{ fontSize:12, color:"#34d399", fontWeight:700 }}>Available Now:</span>
          {avail.map(d => (
            <span key={d.id} style={{ background:"#065f46", color:"#6ee7b7", padding:"2px 10px", borderRadius:20, fontSize:12, fontWeight:700 }}>{d.name} · {d.truck.split(' ').slice(0,2).join(' ')}</span>
          ))}
        </div>
      )}

      <div className="kanban-5" style={{ overflowX:"auto" }}>
        {COLS.map(col => {
          const colLoads = loads.filter(l => l.status===col.key);
          return (
            <div key={col.key} style={{ background:"var(--bg-nav)", borderRadius:10, border:"1px solid var(--border)", padding:10, minHeight:200 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <p style={{ fontSize:12, fontWeight:700, color:col.color }}>{col.label}</p>
                <span style={{ background:col.color+"22", color:col.color, borderRadius:20, padding:"1px 8px", fontSize:11, fontWeight:700 }}>{colLoads.length}</span>
              </div>
              {colLoads.map(l => (
                <div key={l.id} style={{ background:"var(--bg-card)", borderRadius:8, border:"1px solid var(--border)", padding:10, marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                    <Badge label={l.type==="oo"?"OO":"Broker"} color={l.type==="oo"?"#10B981":"#F59E0B"} small />
                    <span style={{ fontSize:13, fontWeight:900, color:"#10B981" }}>${l.rate.toLocaleString()}</span>
                  </div>
                  <p style={{ fontSize:12, fontWeight:700 }}>{l.origin}</p>
                  <p style={{ fontSize:11, color:"var(--muted)" }}>→ {l.dest}</p>
                  <p style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>{l.shipper}</p>
                  <p style={{ fontSize:11, color:"var(--muted)", marginTop:2 }}>{l.type==="oo"?(l.driver||"Unassigned"):(l.carrier||"Carrier TBD")}</p>
                  {l.pickupDate && <p style={{ fontSize:10, color:"var(--dim)", marginTop:3 }}>📅 {l.pickupDate}</p>}
                  {col.key!=="delivered" && (
                    <button onClick={() => advance(l.id, col.key)} style={{ marginTop:8, width:"100%", fontSize:11, padding:"4px", background:"var(--bg-subtle)", border:"none", color:"#9CA3AF", borderRadius:6, fontWeight:700 }}>
                      Advance →
                    </button>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>
      {showAdd && <LoadModal onClose={() => setShowAdd(false)} setLoads={setLoads} drivers={drivers} />}
    </div>
  );
}

// ════════════════════════════════════════
//  LOAD MODAL (add / edit)
// ════════════════════════════════════════
function LoadModal({ onClose, setLoads, drivers, existing }) {
  const [f, setF] = useState(existing || {
    type:"oo", shipper:"", shipperContact:"", origin:"", dest:"",
    pickupDate:"", deliveryDate:"", rate:"", driver:"", driverId:null,
    carrier:"", carrierPay:"", status:"pending",
    commodity:"General Freight", weight:"", miles:"", poNumber:"", notes:""
  });
  const s = (k,v) => setF(p => ({ ...p, [k]:v }));

  function save() {
    if (!f.shipper||!f.origin||!f.dest||!f.rate) return alert("Fill required fields (Shipper, Origin, Dest, Rate)");
    const load = { ...f, id: existing?existing.id:Date.now(), rate:+f.rate||0, carrierPay:+f.carrierPay||0, miles:+f.miles||0, invoiced:existing?.invoiced||false, paid:existing?.paid||false };
    if (existing) setLoads(prev => prev.map(l => l.id===load.id?load:l));
    else setLoads(prev => [...prev, load]);
    onClose();
  }

  const broker = f.type==="broker";
  const margin = broker && f.rate && f.carrierPay ? +f.rate - +f.carrierPay : null;

  return (
    <Modal title={existing?"Edit Load":"Add New Load"} onClose={onClose} wide>
      <div className="form-grid">
        <Field label="Load Type *">
          <select style={inp} value={f.type} onChange={e => s("type",e.target.value)}>
            <option value="oo">OO Load (Our Driver)</option>
            <option value="broker">Brokered Load (3rd Party)</option>
          </select>
        </Field>
        <Field label="Status">
          <select style={inp} value={f.status} onChange={e => s("status",e.target.value)}>
            {["pending","assigned","picked-up","in-transit","delivered"].map(v => <option key={v} value={v}>{v}</option>)}
          </select>
        </Field>
        <Field label="Shipper *"><input style={inp} value={f.shipper} onChange={e=>s("shipper",e.target.value)} placeholder="Amazon Relay" /></Field>
        <Field label="Shipper Contact"><input style={inp} value={f.shipperContact} onChange={e=>s("shipperContact",e.target.value)} placeholder="800-555-0000" /></Field>
        <Field label="Origin *"><input style={inp} value={f.origin} onChange={e=>s("origin",e.target.value)} placeholder="Houston, TX" /></Field>
        <Field label="Destination *"><input style={inp} value={f.dest} onChange={e=>s("dest",e.target.value)} placeholder="Dallas, TX" /></Field>
        <Field label="Pickup Date"><input type="date" style={inp} value={f.pickupDate} onChange={e=>s("pickupDate",e.target.value)} /></Field>
        <Field label="Delivery Date"><input type="date" style={inp} value={f.deliveryDate} onChange={e=>s("deliveryDate",e.target.value)} /></Field>
        <Field label="Rate ($) *"><input type="number" style={inp} value={f.rate} onChange={e=>s("rate",e.target.value)} placeholder="2500" /></Field>
        {broker
          ? <Field label="Carrier Pay ($)"><input type="number" style={inp} value={f.carrierPay} onChange={e=>s("carrierPay",e.target.value)} placeholder="2000" /></Field>
          : <Field label="Assign Driver">
              <select style={inp} value={f.driver} onChange={e=>{const d=drivers.find(d=>d.name===e.target.value);s("driver",e.target.value);s("driverId",d?.id||null);}}>
                <option value="">-- Select Driver --</option>
                {drivers.filter(d=>d.status!=="inactive").map(d=><option key={d.id} value={d.name}>{d.name} ({d.status})</option>)}
              </select>
            </Field>
        }
        {broker && <Field label="Carrier"><input style={inp} value={f.carrier} onChange={e=>s("carrier",e.target.value)} placeholder="JT Trucking LLC" /></Field>}
        <Field label="Commodity"><input style={inp} value={f.commodity} onChange={e=>s("commodity",e.target.value)} placeholder="General Freight" /></Field>
        <Field label="Weight"><input style={inp} value={f.weight} onChange={e=>s("weight",e.target.value)} placeholder="42,000 lbs" /></Field>
        <Field label="Miles"><input type="number" style={inp} value={f.miles} onChange={e=>s("miles",e.target.value)} placeholder="450" /></Field>
        <Field label="PO Number"><input style={inp} value={f.poNumber} onChange={e=>s("poNumber",e.target.value)} placeholder="PO-2025-001" /></Field>
        <div style={{ gridColumn:"1/-1" }}>
          <Field label="Notes"><textarea style={{ ...inp, height:60, resize:"vertical" }} value={f.notes} onChange={e=>s("notes",e.target.value)} /></Field>
        </div>
      </div>
      {margin !== null && (
        <div style={{ background:"#064e3b", borderRadius:8, padding:10, marginTop:8, textAlign:"center" }}>
          <p style={{ color:"var(--muted)", fontSize:11 }}>Margin on this load</p>
          <p style={{ color:"#10B981", fontSize:22, fontWeight:900 }}>${margin.toLocaleString()} ({Math.round(margin/+f.rate*100)}%)</p>
        </div>
      )}
      <div style={{ display:"flex", gap:8, marginTop:16, justifyContent:"flex-end" }}>
        <button onClick={onClose} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid var(--border-hi)", background:"none", color:"#9CA3AF" }}>Cancel</button>
        <button onClick={save} style={{ padding:"8px 20px", borderRadius:8, border:"none", background:"#1d4ed8", color:"#fff", fontWeight:700 }}>Save Load</button>
      </div>
    </Modal>
  );
}

// ════════════════════════════════════════
//  OO PIPELINE
// ════════════════════════════════════════
const STAGES = [
  { key:"lead",              label:"🎯 Lead",               color:"var(--muted)", desc:"Initial contact made" },
  { key:"documents-pending", label:"📋 Docs Pending",       color:"#F59E0B", desc:"Collecting paperwork" },
  { key:"active",            label:"✅ Active",              color:"#10B981", desc:"Running loads" },
  { key:"inactive",          label:"⏸ Inactive",            color:"#EF4444", desc:"No longer running" },
];

function PipelineTab({ drivers, setDrivers, setTab }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);

  const totalGross = drivers.filter(d=>d.onboardingStatus==="active"||(d.status!=="inactive"&&!d.onboardingStatus)).reduce((s,d)=>s+(+d.weekGross||0),0);
  const totalCut   = Math.round(totalGross * 0.12);
  const activeCount = drivers.filter(d=>d.onboardingStatus==="active"||(d.status!=="inactive"&&!d.onboardingStatus)).length;

  function del(id) {
    if (!confirm("Remove this OO?")) return;
    setDrivers(prev => prev.filter(d => d.id !== id));
  }
  function move(id, newStage) {
    setDrivers(prev => prev.map(d => d.id===id ? { ...d, onboardingStatus:newStage } : d));
  }

  return (
    <div>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:18 }}>🔄 Owner Operator Pipeline</p>
          <p style={{ color:"var(--muted)", fontSize:12, marginTop:2 }}>Track every OO from first contact to active fleet member</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"10px 20px", borderRadius:10, fontWeight:700, fontSize:13 }}>+ Add OO</button>
      </div>

      {/* Fleet summary bar */}
      <div className="grid-kpi-top" style={{ marginBottom:20 }}>
        {[
          { label:"Total Fleet",       value: drivers.length,                                                                      color:"#3B82F6", icon:"🚛" },
          { label:"Active OOs",        value: activeCount,                                                                         color:"#10B981", icon:"✅" },
          { label:"Fleet Gross / Wk",  value: "$"+totalGross.toLocaleString(),                                                      color:"#10B981", icon:"💵" },
          { label:"Your 12% Cut / Wk", value: "$"+totalCut.toLocaleString(),                                                       color:"#F59E0B", icon:"✂️" },
        ].map((s,i) => (
          <Card key={i} style={{ textAlign:"center", padding:14 }}>
            <p style={{ fontSize:22, marginBottom:4 }}>{s.icon}</p>
            <p style={{ color:s.color, fontSize:22, fontWeight:900 }}>{s.value}</p>
            <p style={{ color:"var(--muted)", fontSize:11, marginTop:2 }}>{s.label}</p>
          </Card>
        ))}
      </div>

      {drivers.length === 0 && (
        <Card style={{ textAlign:"center", padding:56 }}>
          <p style={{ fontSize:40, marginBottom:12 }}>🚛</p>
          <p style={{ fontWeight:700, fontSize:18, marginBottom:8 }}>No OOs yet</p>
          <p style={{ color:"var(--muted)", fontSize:13, marginBottom:20 }}>Add your first owner operator to start building your fleet.</p>
          <button onClick={()=>setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"10px 24px", borderRadius:8, fontWeight:700, fontSize:14 }}>+ Add Your First OO</button>
        </Card>
      )}

      {/* Pipeline kanban */}
      {drivers.length > 0 && (
        <div className="kanban-4" style={{ overflowX:"auto" }}>
          {STAGES.map(stage => {
            const stageDrivers = drivers.filter(d => {
              const os = d.onboardingStatus;
              if (os) return os === stage.key;
              // legacy records without onboardingStatus: map by dispatch status
              if (stage.key === "active")   return d.status === "available" || d.status === "on-load";
              if (stage.key === "inactive") return d.status === "inactive";
              return false;
            });
            const stageGross = stageDrivers.reduce((s,d)=>s+(+d.weekGross||0),0);

            return (
              <div key={stage.key} style={{ background:"var(--bg-nav)", borderRadius:12, border:`1px solid ${stage.color}33`, padding:12, minHeight:300 }}>
                {/* Column header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <div>
                    <p style={{ fontWeight:700, fontSize:13, color:stage.color }}>{stage.label}</p>
                    <p style={{ fontSize:10, color:"var(--dim)", marginTop:1 }}>{stage.desc}</p>
                  </div>
                  <span style={{ background:stage.color+"22", color:stage.color, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:900 }}>{stageDrivers.length}</span>
                </div>
                {stage.key==="active" && stageDrivers.length>0 && (
                  <div style={{ background:"#064e3b", borderRadius:8, padding:"6px 10px", marginBottom:8, textAlign:"center" }}>
                    <p style={{ fontSize:10, color:"var(--muted)" }}>Combined gross / wk</p>
                    <p style={{ color:"#10B981", fontWeight:900, fontSize:15 }}>${stageGross.toLocaleString()}</p>
                    <p style={{ color:"#065f46", fontSize:10 }}>Your cut: ${Math.round(stageGross*0.12).toLocaleString()}/wk</p>
                  </div>
                )}

                {/* OO cards */}
                {stageDrivers.map(d => {
                  const cdlDays = daysUntil(d.cdlExpiry);
                  const inssDays = daysUntil(d.insuranceExpiry);
                  const hasAlert = cdlDays<=60 || inssDays<=60 || daysUntil(d.medCardExpiry)<=60 || daysUntil(d.inspectionExpiry)<=60 || daysUntil(d.registrationExpiry)<=60;
                  return (
                    <div key={d.id} style={{ background:"var(--bg-card)", borderRadius:10, border:`1px solid ${hasAlert?"#F59E0B33":"#1f2937"}`, padding:12, marginBottom:8 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <p style={{ fontWeight:700, fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{d.name}</p>
                          {d.phone && <p style={{ fontSize:11, color:"var(--muted)", marginTop:1 }}>📞 {d.phone}</p>}
                        </div>
                        {hasAlert && <span style={{ fontSize:14, marginLeft:6 }}>⚠️</span>}
                      </div>

                      {d.truck && <p style={{ fontSize:11, color:"#9CA3AF", marginBottom:4 }}>🚛 {d.truck}</p>}

                      {d.weekGross > 0 && (
                        <div style={{ display:"flex", justifyContent:"space-between", background:"var(--bg-subtle)", borderRadius:6, padding:"4px 8px", marginBottom:8 }}>
                          <span style={{ fontSize:11, color:"var(--muted)" }}>Gross/wk</span>
                          <span style={{ fontSize:11, fontWeight:700, color:"#10B981" }}>${(+d.weekGross).toLocaleString()}</span>
                        </div>
                      )}

                      {/* Compliance pills */}
                      <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:8 }}>
                        {[
                          { label:"CDL",  days: daysUntil(d.cdlExpiry) },
                          { label:"Med",  days: daysUntil(d.medCardExpiry) },
                          { label:"Ins",  days: daysUntil(d.insuranceExpiry) },
                          { label:"Insp", days: daysUntil(d.inspectionExpiry) },
                          { label:"Reg",  days: daysUntil(d.registrationExpiry) },
                        ].filter(x => x.days < 999).map((x,i) => (
                          <span key={i} style={{ fontSize:9, fontWeight:700, padding:"1px 5px", borderRadius:3, background: daysUntilColor(x.days)+"22", color: daysUntilColor(x.days) }}>
                            {x.label} {daysLabel(x.days)}
                          </span>
                        ))}
                      </div>

                      {/* Actions */}
                      <div style={{ display:"flex", gap:4 }}>
                        <button onClick={()=>setEditing(d)} style={{ flex:1, fontSize:11, padding:"5px", background:"var(--bg-subtle)", border:"none", color:"#9CA3AF", borderRadius:6, fontWeight:700 }}>✏️ Edit</button>
                        {stage.key !== "active" && (
                          <button onClick={()=>move(d.id,"active")} style={{ flex:1, fontSize:11, padding:"5px", background:"#064e3b", border:"none", color:"#34d399", borderRadius:6, fontWeight:700 }}>→ Active</button>
                        )}
                        {stage.key !== "inactive" && (
                          <button onClick={()=>del(d.id)} style={{ fontSize:11, padding:"5px 8px", background:"var(--bg-subtle)", border:"none", color:"#EF4444", borderRadius:6 }}>✕</button>
                        )}
                      </div>

                      {/* Move stage selector */}
                      <select value={d.onboardingStatus||"active"} onChange={e=>move(d.id,e.target.value)}
                        style={{ ...inp, fontSize:11, padding:"4px 6px", marginTop:6, color:"var(--muted)" }}>
                        {STAGES.map(st=><option key={st.key} value={st.key}>{st.label}</option>)}
                      </select>
                    </div>
                  );
                })}

                {stageDrivers.length === 0 && (
                  <p style={{ color:"#374151", fontSize:12, textAlign:"center", marginTop:20 }}>No OOs here</p>
                )}
              </div>
            );
          })}
        </div>
      )}

      {(showAdd || editing) && (
        <DriverModal driver={editing} onClose={()=>{setShowAdd(false);setEditing(null);}} setDrivers={setDrivers} />
      )}
    </div>
  );
}

// ════════════════════════════════════════
//  DRIVERS
// ════════════════════════════════════════
function DriversTab({ drivers, setDrivers }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all");

  const filtered = filter==="all" ? drivers : drivers.filter(d=>d.type===filter||d.status===filter);

  function del(id) { if(!confirm("Remove driver?")) return; setDrivers(prev=>prev.filter(d=>d.id!==id)); }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:16 }}>👥 Driver Roster</p>

      </Card></div>}
      {(showAdd||editing) && <DriverModal driver={editing} onClose={()=>{setShowAdd(false);setEditing(null);}} setDrivers={setDrivers} />}

  );
}

function DriverModal({ driver, onClose, setDrivers }) {
  const [f, setF] = useState(driver || {
    name:"", phone:"", email:"", cdl:"", cdlExpiry:"", medCardExpiry:"",
    truck:"", plate:"", vin:"", type:"OO", status:"available",
    onboardingStatus:"lead", dateSigned:"",
    mvr:"Clean", csa:0, drugTest:"", drugTestPass:true,
    insuranceExpiry:"", inspectionExpiry:"", registrationExpiry:"",
    weekGross:0, totalLoads:0, joinDate:TODAY, notes:""
  });
  const s = (k,v) => setF(p=>({...p,[k]:v}));

  function save() {
    if (!f.name) return alert("Full name is required");
    const rec = {
      ...f,
      id: driver ? driver.id : Date.now(),
      weekGross:  +f.weekGross  || 0,
      csa:        +f.csa        || 0,
      totalLoads: +f.totalLoads || 0,
    };
    if (driver) setDrivers(prev => prev.map(d => d.id===driver.id ? rec : d));
    else        setDrivers(prev => [...prev, rec]);
    onClose();
  }

  const cut = Math.round((+f.weekGross||0) * 0.12);

  const SEC = (label) => (
    <div style={{ gridColumn:"1/-1", borderTop:"1px solid var(--border)", paddingTop:12, marginTop:4 }}>
      <p style={{ fontSize:11, fontWeight:700, color:"var(--dim)", letterSpacing:1, textTransform:"uppercase" }}>{label}</p>
    </div>
  );

  return (
    <Modal title={driver ? "Edit OO Profile" : "Add Owner Operator"} onClose={onClose} wide>
      <div className="form-grid">

        {SEC("Contact Info")}
        <Field label="Full Name *"><input style={inp} value={f.name} onChange={e=>s("name",e.target.value)} placeholder="John Smith" /></Field>
        <Field label="Phone"><input style={inp} value={f.phone} onChange={e=>s("phone",e.target.value)} placeholder="832-555-0000" /></Field>
        <Field label="Email"><input style={inp} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="driver@email.com" /></Field>
        <Field label="CDL Number"><input style={inp} value={f.cdl} onChange={e=>s("cdl",e.target.value)} placeholder="TX1234567" /></Field>

        {SEC("Onboarding")}
        <Field label="Onboarding Status">
          <select style={inp} value={f.onboardingStatus} onChange={e=>s("onboardingStatus",e.target.value)}>
            <option value="lead">Lead</option>
            <option value="documents-pending">Documents Pending</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </Field>
        <Field label="Driver Type">
          <select style={inp} value={f.type} onChange={e=>s("type",e.target.value)}>
            <option value="OO">Owner Operator (OO)</option>
            <option value="Leased">Leased</option>
            <option value="Company">Company Driver</option>
          </select>
        </Field>
        <Field label="Date Signed / Joined"><input type="date" style={inp} value={f.dateSigned} onChange={e=>s("dateSigned",e.target.value)} /></Field>
        <Field label="Dispatch Status">
          <select style={inp} value={f.status} onChange={e=>s("status",e.target.value)}>
            <option value="available">Available</option>
            <option value="on-load">On Load</option>
            <option value="inactive">Inactive</option>
          </select>
        </Field>

        {SEC("Truck Info")}
        <Field label="Truck (Year Make Model)"><input style={inp} value={f.truck} onChange={e=>s("truck",e.target.value)} placeholder="2020 Peterbilt 579" /></Field>
        <Field label="License Plate"><input style={inp} value={f.plate} onChange={e=>s("plate",e.target.value)} placeholder="TX-ABC123" /></Field>
        <div style={{ gridColumn:"1/-1" }}>
          <Field label="VIN"><input style={inp} value={f.vin} onChange={e=>s("vin",e.target.value)} placeholder="1XPWD49X1ED215307" /></Field>
        </div>

        {SEC("Compliance Dates")}
        <Field label="CDL Expiry"><input type="date" style={inp} value={f.cdlExpiry} onChange={e=>s("cdlExpiry",e.target.value)} /></Field>
        <Field label="Medical Card Expiry"><input type="date" style={inp} value={f.medCardExpiry} onChange={e=>s("medCardExpiry",e.target.value)} /></Field>
        <Field label="Insurance Expiry"><input type="date" style={inp} value={f.insuranceExpiry} onChange={e=>s("insuranceExpiry",e.target.value)} /></Field>
        <Field label="Annual Inspection Expiry"><input type="date" style={inp} value={f.inspectionExpiry} onChange={e=>s("inspectionExpiry",e.target.value)} /></Field>
        <Field label="Registration Expiry"><input type="date" style={inp} value={f.registrationExpiry} onChange={e=>s("registrationExpiry",e.target.value)} /></Field>
        <Field label="Last Drug Test"><input type="date" style={inp} value={f.drugTest} onChange={e=>s("drugTest",e.target.value)} /></Field>
        <Field label="MVR Status">
          <select style={inp} value={f.mvr} onChange={e=>s("mvr",e.target.value)}>
            <option>Clean</option><option>1 Minor</option><option>2 Violations</option><option>3+ Violations</option><option>DQ</option>
          </select>
        </Field>
        <Field label="CSA Score"><input type="number" style={inp} value={f.csa} onChange={e=>s("csa",e.target.value)} placeholder="0" /></Field>

        {SEC("Financials")}
        <Field label="Weekly Gross ($)"><input type="number" style={inp} value={f.weekGross} onChange={e=>s("weekGross",e.target.value)} placeholder="4500" /></Field>
        <div style={{ display:"flex", flexDirection:"column", justifyContent:"flex-end", paddingBottom:12 }}>
          <p style={{ fontSize:11, color:"var(--muted)", marginBottom:4 }}>YOUR 12% CUT / WEEK</p>
          <p style={{ fontSize:22, fontWeight:900, color:"#10B981" }}>${cut.toLocaleString()}</p>
          <p style={{ fontSize:10, color:"var(--dim)" }}>≈ ${(cut*4.3).toLocaleString()}/mo</p>
        </div>

        <div style={{ gridColumn:"1/-1" }}>
          <Field label="Notes"><textarea style={{ ...inp, height:60, resize:"vertical" }} value={f.notes} onChange={e=>s("notes",e.target.value)} /></Field>
        </div>
      </div>

      <div style={{ display:"flex", gap:8, marginTop:16, justifyContent:"flex-end" }}>
        <button onClick={onClose} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid var(--border-hi)", background:"none", color:"#9CA3AF" }}>Cancel</button>
        <button onClick={save} style={{ padding:"8px 20px", borderRadius:8, border:"none", background:"#1d4ed8", color:"#fff", fontWeight:700 }}>Save OO Profile</button>
      </div>
    </Modal>
  );
}

function LoadsTab({ loads, setLoads, drivers }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [statusF, setStatusF] = useState("all");
  const [typeF, setTypeF] = useState("all");

  const filtered = loads.filter(l => {
    if (statusF!=="all" && l.status!==statusF) return false;
    if (typeF!=="all" && l.type!==typeF) return false;
    return true;
  });

  function del(id) { if(!confirm("Delete load?")) return; setLoads(prev=>prev.filter(l=>l.id!==id)); }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:16 }}>📦 All Loads</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>{loads.length} total · ${loads.filter(l=>l.status==="delivered").reduce((s,l)=>s+l.rate,0).toLocaleString()} delivered gross</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <select value={typeF} onChange={e=>setTypeF(e.target.value)} style={{ ...inp, width:"auto", fontSize:12, padding:"6px 10px" }}>
            <option value="all">All Types</option><option value="oo">OO</option><option value="broker">Brokered</option>
          </select>
          <select value={statusF} onChange={e=>setStatusF(e.target.value)} style={{ ...inp, width:"auto", fontSize:12, padding:"6px 10px" }}>
            {["all","pending","assigned","picked-up","in-transit","delivered"].map(v=><option key={v} value={v}>{v==="all"?"All Status":v}</option>)}
          </select>
          <button onClick={()=>setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"8px 16px", borderRadius:8, fontWeight:700, fontSize:13 }}>+ Add Load</button>
        </div>
      </div>
      {filtered.length === 0 && (
        <Card style={{ textAlign:"center", padding:48 }}>
          <p style={{ fontSize:36, marginBottom:12 }}>📦</p>
          <p style={{ fontWeight:700, fontSize:16, marginBottom:8 }}>{loads.length === 0 ? "No loads yet" : "No loads match this filter"}</p>
          <p style={{ color:"var(--muted)", fontSize:13, marginBottom:20 }}>{loads.length === 0 ? "Add your first load to start tracking routes, rates, and revenue." : "Try a different filter."}</p>
          {loads.length === 0 && <button onClick={()=>setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"10px 24px", borderRadius:8, fontWeight:700, fontSize:14 }}>+ Add First Load</button>}
        </Card>
      )}
      {filtered.length > 0 && <div className="table-scroll"><Card style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"var(--bg-nav)" }}>
              {["Type","Status","Route","Shipper","Driver/Carrier","Pickup","Rate","Our Margin","Invoice",""].map(h=>(
                <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontSize:11, color:"var(--muted)", fontWeight:700, whiteSpace:"nowrap", borderBottom:"1px solid var(--border)" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(l => {
              const margin = l.type==="broker" ? l.rate-l.carrierPay : Math.round(l.rate*0.12);
              return (
                <tr key={l.id} style={{ borderBottom:"1px solid var(--border)" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#1f293755"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"10px 12px" }}><Badge label={l.type==="oo"?"OO":"Broker"} color={l.type==="oo"?"#10B981":"#F59E0B"} /></td>
                  <td style={{ padding:"10px 12px" }}><Badge label={l.status} color={statusColor(l.status)} /></td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700 }}>{l.origin}</p>
                    <p style={{ fontSize:11, color:"var(--muted)" }}>→ {l.dest}</p>
                  </td>
                  <td style={{ padding:"10px 12px", fontSize:12 }}>{l.shipper}</td>
                  <td style={{ padding:"10px 12px", fontSize:12, color:"#9CA3AF" }}>{l.type==="oo"?(l.driver||"—"):(l.carrier||"—")}</td>
                  <td style={{ padding:"10px 12px", fontSize:12, color:"var(--muted)" }}>{l.pickupDate||"—"}</td>
                  <td style={{ padding:"10px 12px", fontWeight:700 }}>${l.rate.toLocaleString()}</td>
                  <td style={{ padding:"10px 12px", color:"#10B981", fontWeight:700 }}>${margin.toLocaleString()}</td>
                  <td style={{ padding:"10px 12px" }}>
                    <span style={{ fontSize:11, color:l.paid?"#10B981":l.invoiced?"#F59E0B":"#6B7280" }}>
                      {l.paid?"✅ Paid":l.invoiced?"📤 Invoiced":"⏳ Pending"}
                    </span>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>setEditing(l)} style={{ fontSize:11, padding:"4px 8px", background:"var(--bg-subtle)", border:"none", color:"#9CA3AF", borderRadius:6 }}>Edit</button>
                      <button onClick={()=>del(l.id)} style={{ fontSize:11, padding:"4px 8px", background:"var(--bg-subtle)", border:"none", color:"#EF4444", borderRadius:6 }}>✕</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card></div>}
      {(showAdd||editing) && <LoadModal existing={editing} onClose={()=>{setShowAdd(false);setEditing(null);}} setLoads={setLoads} drivers={drivers} />}
    </div>
  );
}

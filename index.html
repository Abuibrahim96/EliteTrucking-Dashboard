const BROKER_BLANK = { shipper:"", origin:"", dest:"", date:TODAY, loadRate:"", carrierRate:"", notes:"" };

function FinanceTab({ loads, setLoads, drivers, ooFees, brokerProfit, totalProfit, brokerLoads, setBrokerLoads }) {
  const brokerDel = loads.filter(l=>l.type==="broker"&&l.status==="delivered");
  const needsInvoice = loads.filter(l=>l.status==="delivered"&&!l.invoiced);
  const outstanding = loads.filter(l=>l.invoiced&&!l.paid);

  const markInvoiced = id => setLoads(prev=>prev.map(l=>l.id===id?{...l,invoiced:true}:l));
  const markPaid     = id => setLoads(prev=>prev.map(l=>l.id===id?{...l,paid:true}:l));

  // Brokerage form state
  const [showBrokerForm, setShowBrokerForm] = React.useState(false);
  const [brokerForm, setBrokerForm] = React.useState(BROKER_BLANK);
  const [editBrokerId, setEditBrokerId] = React.useState(null);

  const bFld = (k,v) => setBrokerForm(p=>({...p,[k]:v}));

  const saveBrokerLoad = () => {
    if (!brokerForm.loadRate || !brokerForm.carrierRate) return;
    if (editBrokerId) {
      setBrokerLoads(prev=>prev.map(b=>b.id===editBrokerId?{...brokerForm,id:editBrokerId}:b));
    } else {
      setBrokerLoads(prev=>[...prev,{...brokerForm,id:Date.now()}]);
    }
    setBrokerForm(BROKER_BLANK); setShowBrokerForm(false); setEditBrokerId(null);
  };

  const editBrokerLoad = b => { setBrokerForm({...b}); setEditBrokerId(b.id); setShowBrokerForm(true); };
  const deleteBrokerLoad = id => { if(confirm("Delete this brokerage load?")) setBrokerLoads(prev=>prev.filter(b=>b.id!==id)); };

  const totalLoadRevenue  = brokerLoads.reduce((s,b)=>s+(Number(b.loadRate)||0), 0);
  const totalCarrierCost  = brokerLoads.reduce((s,b)=>s+(Number(b.carrierRate)||0), 0);
  const totalBrokerProfit = totalLoadRevenue - totalCarrierCost;

  const kpis = [
    { label:"OO Dispatch Fees",   value:ooFees,       color:"#10B981", sub:`${drivers.filter(d=>d.weekGross>0).length} drivers × 12%` },
    { label:"Brokerage Profit",   value:brokerProfit,  color:"#F59E0B", sub:`${brokerDel.length + brokerLoads.length} loads brokered` },
    { label:"Total Weekly Profit",value:totalProfit,   color:"#10B981", sub:`≈ $${(totalProfit*4.3).toLocaleString()}/mo` },
    { label:"Outstanding A/R",    value:outstanding.reduce((s,l)=>s+l.rate,0), color:"#EF4444", sub:`${outstanding.length} invoices unpaid` },
  ];

  return (
    <div>
      <p style={{ fontWeight:900, fontSize:16, marginBottom:16 }}>💰 Finance Dashboard</p>
      <div className="grid-kpi-top" style={{ marginBottom:16 }}>
        {kpis.map((k,i) => (
          <Card key={i} style={{ textAlign:"center" }}>
            <p style={{ color:"var(--muted)", fontSize:11, marginBottom:4 }}>{k.label}</p>
            <p style={{ color:k.color, fontSize:24, fontWeight:900 }}>${k.value.toLocaleString()}</p>
            <p style={{ color:"var(--dim)", fontSize:11, marginTop:2 }}>{k.sub}</p>
          </Card>
        ))}
      </div>

      {/* ── Brokerage Load Tracker ─────────────────────── */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:8 }}>
          <p style={{ fontWeight:700, fontSize:15, margin:0 }}>📦 Brokerage Load Tracker</p>
          <button onClick={()=>{ setBrokerForm(BROKER_BLANK); setEditBrokerId(null); setShowBrokerForm(v=>!v); }}
            style={{ padding:"7px 14px", background:"#2563eb", border:"none", color:"#fff", borderRadius:8, fontSize:12, fontWeight:700 }}>
            {showBrokerForm && !editBrokerId ? "✕ Cancel" : "+ Add Load"}
          </button>
        </div>

        {showBrokerForm && (
          <div style={{ background:"var(--bg-subtle)", borderRadius:10, padding:16, marginBottom:16, border:"1px solid var(--border-hi)" }}>
            <p style={{ fontWeight:700, fontSize:13, marginBottom:12, color:"var(--muted)" }}>{editBrokerId ? "Edit Brokerage Load" : "New Brokerage Load"}</p>
            <div className="form-grid" style={{ gap:10, marginBottom:10 }}>
              <div>
                <label style={{ fontSize:11, color:"var(--muted)", display:"block", marginBottom:4 }}>Customer / Shipper</label>
                <input value={brokerForm.shipper} onChange={e=>bFld("shipper",e.target.value)} placeholder="e.g. Amazon Freight"
                  style={{ width:"100%", background:"var(--bg-card)", border:"1px solid var(--border-hi)", color:"var(--text)", borderRadius:8, padding:"8px 10px", fontSize:13, boxSizing:"border-box" }} />
              </div>
              <div>
                <label style={{ fontSize:11, color:"var(--muted)", display:"block", marginBottom:4 }}>Date</label>
                <input type="date" value={brokerForm.date} onChange={e=>bFld("date",e.target.value)}
                  style={{ width:"100%", background:"var(--bg-card)", border:"1px solid var(--border-hi)", color:"var(--text)", borderRadius:8, padding:"8px 10px", fontSize:13, boxSizing:"border-box" }} />
              </div>
              <div>
                <label style={{ fontSize:11, color:"var(--muted)", display:"block", marginBottom:4 }}>Origin</label>
                <input value={brokerForm.origin} onChange={e=>bFld("origin",e.target.value)} placeholder="City, ST"
                  style={{ width:"100%", background:"var(--bg-card)", border:"1px solid var(--border-hi)", color:"var(--text)", borderRadius:8, padding:"8px 10px", fontSize:13, boxSizing:"border-box" }} />
              </div>
              <div>
                <label style={{ fontSize:11, color:"var(--muted)", display:"block", marginBottom:4 }}>Destination</label>

                      <td style={{ padding:"9px 10px", color:"#EF4444" }}>${(Number(b.carrierRate)||0).toLocaleString()}</td>
                      <td style={{ padding:"9px 10px", fontWeight:900, color: margin>=0?"#10B981":"#EF4444" }}>${margin.toLocaleString()}</td>

                  <td style={{ padding:"10px", fontWeight:900, color:"#EF4444", fontSize:14 }}>${totalCarrierCost.toLocaleString()}</td>
                  <td style={{ padding:"10px", fontWeight:900, color: totalBrokerProfit>=0?"#10B981":"#EF4444", fontSize:14 }}>${totalBrokerProfit.toLocaleString()}</td>

                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </Card>

      <div className="grid-2col" style={{ marginBottom:16 }}>
        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>🚛 Driver Settlements This Week</p>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ borderBottom:"1px solid var(--border)" }}>
                {["Driver","Type","Gross","Our 12%","They Keep"].map(h=>(
                  <th key={h} style={{ padding:"6px 8px", textAlign: h==="Driver"?"left":"right", fontSize:11, color:"var(--muted)" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {drivers.filter(d=>d.weekGross>0).map(d=>(
                <tr key={d.id} style={{ borderBottom:"1px solid var(--border)" }}>
                  <td style={{ padding:"8px", fontWeight:700, fontSize:13 }}>{d.name}</td>
                  <td style={{ padding:"8px", textAlign:"right" }}><Badge label={d.type} color={d.type==="OO"?"#10B981":"#3B82F6"} small /></td>
                  <td style={{ padding:"8px", textAlign:"right" }}>${d.weekGross.toLocaleString()}</td>
                  <td style={{ padding:"8px", textAlign:"right", color:"#10B981", fontWeight:700 }}>${Math.round(d.weekGross*0.12).toLocaleString()}</td>

                </tr>
              ))}

                <td colSpan={3} style={{ padding:"8px", fontWeight:700 }}>Total</td>
                <td style={{ padding:"8px", textAlign:"right", color:"#10B981", fontWeight:900 }}>${ooFees.toLocaleString()}</td>
                <td style={{ padding:"8px", textAlign:"right", color:"var(--muted)", fontWeight:700 }}>${drivers.filter(d=>d.weekGross>0).reduce((s,d)=>s+Math.round(d.weekGross*0.88),0).toLocaleString()}</td>

            </tbody>
          </table>
        </Card>

        <Card>
          <p style={{ fontWeight:700, marginBottom:10 }}>📈 Load-Linked Brokerage</p>
          <p style={{ fontSize:11, color:"var(--muted)", marginBottom:10 }}>Delivered broker loads from the Loads tab</p>

              <tr style={{ borderBottom:"1px solid var(--border)" }}>

                  <td style={{ padding:"8px", fontSize:12, fontWeight:700 }}>{l.shipper}</td>
                  <td style={{ padding:"8px", fontSize:11, color:"var(--muted)" }}>{l.origin.split(",")[0]}→{l.dest.split(",")[0]}</td>
                  <td style={{ padding:"8px", fontSize:12 }}>${l.rate.toLocaleString()}</td>
                  <td style={{ padding:"8px", fontSize:12, color:"var(--muted)" }}>${l.carrierPay.toLocaleString()}</td>

                <td colSpan={4} style={{ padding:"8px", fontWeight:700 }}>Total</td>
                <td style={{ padding:"8px", fontWeight:900, color:"#F59E0B" }}>${brokerDel.reduce((s,l)=>s+l.rate-l.carrierPay,0).toLocaleString()}</td>
              </tr>
            </tbody>
          </table>
        </Card>
      </div>

      {needsInvoice.length > 0 && (
        <Card style={{ marginBottom:16, borderColor:"#92400e" }}>
          <p style={{ fontWeight:700, marginBottom:10, color:"#F59E0B" }}>⚠️ Needs Invoice — {needsInvoice.length} delivered loads</p>
          {needsInvoice.map(l=>(
            <div key={l.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 0", borderBottom:"1px solid var(--border)" }}>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:13, fontWeight:700 }}>{l.shipper}</p>
                <p style={{ fontSize:12, color:"var(--muted)" }}>{l.origin} → {l.dest} · {l.pickupDate}</p>
              </div>
              <p style={{ fontWeight:700 }}>${l.rate.toLocaleString()}</p>
              <button onClick={()=>markInvoiced(l.id)} style={{ padding:"6px 12px", background:"#1d4ed8", border:"none", color:"#fff", borderRadius:8, fontSize:12, fontWeight:700 }}>Mark Invoiced</button>
            </div>
          ))}
        </Card>
      )}

      {outstanding.length > 0 && (
        <Card style={{ borderColor:"#991b1b" }}>
          <p style={{ fontWeight:700, marginBottom:10, color:"#EF4444" }}>📤 Outstanding Invoices (A/R) — ${outstanding.reduce((s,l)=>s+l.rate,0).toLocaleString()}</p>
          {outstanding.map(l=>(
            <div key={l.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 0", borderBottom:"1px solid var(--border)" }}>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:13, fontWeight:700 }}>{l.shipper}</p>
                <p style={{ fontSize:12, color:"var(--muted)" }}>{l.origin} → {l.dest} · Invoiced, awaiting payment</p>
              </div>
              <p style={{ fontWeight:700 }}>${l.rate.toLocaleString()}</p>
              <button onClick={()=>markPaid(l.id)} style={{ padding:"6px 12px", background:"#064e3b", border:"none", color:"#34d399", borderRadius:8, fontSize:12, fontWeight:700 }}>Mark Paid ✓</button>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

function ComplianceTab({ drivers, alerts }) {
  const red = alerts.filter(a=>a.sev==="red").length;
  const yellow = alerts.filter(a=>a.sev==="yellow").length;
  const clear = drivers.filter(d => !alerts.some(a=>a.driver===d.name)).length;

  return (
    <div>
      <p style={{ fontWeight:900, fontSize:16, marginBottom:16 }}>🛡️ Compliance Dashboard</p>
      <div className="grid-3col" style={{ gap:12, marginBottom:16 }}>
        <Card style={{ textAlign:"center", borderColor: red>0?"#991b1b":"#1f2937" }}>
          <p style={{ color:"#EF4444", fontSize:32, fontWeight:900 }}>{red}</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>🔴 Critical (expired or ≤30 days)</p>
        </Card>
        <Card style={{ textAlign:"center", borderColor: yellow>0?"#92400e":"#1f2937" }}>
          <p style={{ color:"#F59E0B", fontSize:32, fontWeight:900 }}>{yellow}</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>🟡 Warning (31–60 days)</p>
        </Card>
        <Card style={{ textAlign:"center", borderColor:"#065f46" }}>
          <p style={{ color:"#10B981", fontSize:32, fontWeight:900 }}>{clear}</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>🟢 Drivers fully clear</p>
        </Card>
      </div>
      <div className="table-scroll"><Card style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"var(--bg-nav)" }}>
              {["Driver","Type","CDL Expiry","Med Card","Insurance","Drug Test","MVR","CSA","Status"].map(h=>(
                <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontSize:11, color:"var(--muted)", fontWeight:700, whiteSpace:"nowrap", borderBottom:"1px solid var(--border)" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {drivers.map(d => {
              const c=daysUntil(d.cdlExpiry), m=daysUntil(d.medCardExpiry), ins=daysUntil(d.insuranceExpiry);
              const crit = c<=30||m<=30||ins<=30||d.csa>=65;
              const warn = !crit && (c<=60||m<=60||ins<=60);
              return (
                <tr key={d.id} style={{ borderBottom:"1px solid var(--border)", background: crit?"rgba(239,68,68,0.06)":warn?"rgba(245,158,11,0.06)":"transparent" }}>
                  <td style={{ padding:"10px 12px", fontWeight:700, fontSize:13 }}>{d.name}</td>
                  <td style={{ padding:"10px 12px" }}><Badge label={d.type} color={d.type==="OO"?"#10B981":"#3B82F6"} small /></td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700, color:daysUntilColor(c) }}>{daysLabel(c)}</p>
                    <p style={{ fontSize:10, color:"var(--dim)" }}>{d.cdlExpiry}</p>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700, color:daysUntilColor(m) }}>{daysLabel(m)}</p>
                    <p style={{ fontSize:10, color:"var(--dim)" }}>{d.medCardExpiry}</p>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700, color:daysUntilColor(ins) }}>{daysLabel(ins)}</p>
                    <p style={{ fontSize:10, color:"var(--dim)" }}>{d.insuranceExpiry}</p>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700, color:d.drugTestPass?"#10B981":"#EF4444" }}>{d.drugTestPass?"Pass":"Fail"}</p>
                    <p style={{ fontSize:10, color:"var(--dim)" }}>{d.drugTest}</p>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <p style={{ fontSize:12, fontWeight:700, color:d.mvr==="Clean"?"#10B981":d.mvr==="1 Minor"?"#F59E0B":"#EF4444" }}>{d.mvr}</p>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <span style={{ fontWeight:900, color:d.csa<=15?"#10B981":d.csa<=40?"#F59E0B":"#EF4444" }}>{d.csa||0}</span>
                  </td>
                  <td style={{ padding:"10px 12px" }}>
                    <Badge label={crit?"ACTION REQ":warn?"WATCH":"CLEAR"} color={crit?"#EF4444":warn?"#F59E0B":"#10B981"} />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card></div>
    </div>
  );
}

function ContactsTab({ contacts, setContacts }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [typeF, setTypeF] = useState("all");

  const filtered = typeF==="all" ? contacts : contacts.filter(c=>c.type===typeF);
  const typeColor = { Shipper:"#10B981", Broker:"#F59E0B", Carrier:"#3B82F6", "Load Board":"#8B5CF6", Other:"#6B7280" };

  function del(id) { if(!confirm("Delete contact?")) return; setContacts(prev=>prev.filter(c=>c.id!==id)); }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:16 }}>📋 Contacts & Relationships</p>
          <p style={{ color:"var(--muted)", fontSize:12 }}>{contacts.filter(c=>c.type==="Shipper").length} Shippers · {contacts.filter(c=>c.type==="Carrier").length} Carriers · {contacts.filter(c=>c.type==="Broker").length} Brokers</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <select value={typeF} onChange={e=>setTypeF(e.target.value)} style={{ ...inp, width:"auto", fontSize:12, padding:"6px 10px" }}>
            {["all","Shipper","Broker","Carrier","Load Board","Other"].map(t=><option key={t} value={t}>{t==="all"?"All Types":t}</option>)}
          </select>
          <button onClick={()=>setShowAdd(true)} style={{ background:"#1d4ed8", border:"none", color:"#fff", padding:"8px 16px", borderRadius:8, fontWeight:700, fontSize:13 }}>+ Add Contact</button>
        </div>
      </div>
      <div className="grid-3col" style={{ gap:10 }}>
        {filtered.map(c=>(
          <Card key={c.id}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <div>
                <p style={{ fontWeight:700, fontSize:14 }}>{c.company}</p>
                <Badge label={c.type} color={typeColor[c.type]||"#6B7280"} small />
              </div>
              <div style={{ display:"flex", gap:4 }}>
                <button onClick={()=>setEditing(c)} style={{ fontSize:11, padding:"3px 8px", background:"var(--bg-subtle)", border:"none", color:"#9CA3AF", borderRadius:6 }}>Edit</button>
                <button onClick={()=>del(c.id)} style={{ fontSize:11, padding:"3px 8px", background:"var(--bg-subtle)", border:"none", color:"#EF4444", borderRadius:6 }}>✕</button>
              </div>
            </div>
            {c.contact && <p style={{ fontSize:12, color:"#9CA3AF", marginBottom:2 }}>{c.contact}</p>}
            {c.phone && <p style={{ fontSize:12, color:"var(--muted)" }}>📞 {c.phone}</p>}
            {c.email && <p style={{ fontSize:12, color:"var(--muted)" }}>✉️ {c.email}</p>}
            {c.loads>0 && <p style={{ fontSize:11, color:"var(--dim)", marginTop:4 }}>{c.loads} loads dispatched</p>}
            {c.notes && <p style={{ fontSize:11, color:"var(--dim)", marginTop:4, paddingTop:4, borderTop:"1px solid var(--border)" }}>{c.notes}</p>}
          </Card>
        ))}
      </div>
      {(showAdd||editing) && <ContactModal contact={editing} onClose={()=>{setShowAdd(false);setEditing(null);}} setContacts={setContacts} />}
    </div>
  );
}

function ContactModal({ contact, onClose, setContacts }) {
  const [f, setF] = useState(contact||{ company:"", contact:"", phone:"", email:"", type:"Shipper", loads:0, notes:"" });
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  function save() {
    if (!f.company) return alert("Company name required");
    if (contact) setContacts(prev=>prev.map(c=>c.id===contact.id?{...f,id:contact.id}:c));
    else setContacts(prev=>[...prev,{...f,id:Date.now()}]);
    onClose();
  }
  return (
    <Modal title={contact?"Edit Contact":"Add Contact"} onClose={onClose}>
      <Field label="Company Name *"><input style={inp} value={f.company} onChange={e=>s("company",e.target.value)} placeholder="ABC Logistics" /></Field>
      <Field label="Contact Person"><input style={inp} value={f.contact} onChange={e=>s("contact",e.target.value)} placeholder="John Smith" /></Field>
      <Field label="Type">
        <select style={inp} value={f.type} onChange={e=>s("type",e.target.value)}>
          {["Shipper","Broker","Carrier","Load Board","Other"].map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </Field>
      <Field label="Phone"><input style={inp} value={f.phone} onChange={e=>s("phone",e.target.value)} placeholder="800-555-0000" /></Field>
      <Field label="Email"><input style={inp} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="contact@company.com" /></Field>
      <Field label="Notes"><textarea style={{ ...inp, height:70, resize:"vertical" }} value={f.notes} onChange={e=>s("notes",e.target.value)} /></Field>
      <div style={{ display:"flex", gap:8, marginTop:16, justifyContent:"flex-end" }}>
        <button onClick={onClose} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid var(--border-hi)", background:"none", color:"#9CA3AF" }}>Cancel</button>
        <button onClick={save} style={{ padding:"8px 20px", borderRadius:8, border:"none", background:"#1d4ed8", color:"#fff", fontWeight:700 }}>Save</button>
      </div>
    </Modal>
  );
}

function OperationsTab({ loads, setLoads, drivers }) {
  const [sub, setSub] = useState("dispatch");
  const SUB = [
    { id:"dispatch", label:"📡 Dispatch Board" },
    { id:"loads",    label:"📦 All Loads" },

    <div>

      {sub === "loads"    && <LoadsTab    loads={loads} setLoads={setLoads} drivers={drivers} />}

  );
}

// ════════════════════════════════════════
//  TASK PRIORITY PANEL (Overview)
// ════════════════════════════════════════
function TaskPriorityPanel({ priorityTasks, setPriorityTasks, tasks, tiersOnly, prominent }) {
  const [collapsed, setCollapsed] = useState({ urgent:false, asap:false, normal:false });
  const [showAdd, setShowAdd] = useState(null);
  const [form, setForm] = useState({ text:"", dept:"", person:"", deadline:"", notes:"" });

  const ALL_TIERS = [
    { key:"urgent", label:"URGENT", emoji:"🔴", color:"#EF4444", headerBg:"rgba(127,29,29,0.35)", desc:"Needs to be done immediately" },
    { key:"asap",   label:"ASAP",   emoji:"🟡", color:"#F59E0B", headerBg:"rgba(67,20,7,0.45)",  desc:"Needs to be done today" },
    { key:"normal", label:"NORMAL", emoji:"🟢", color:"#10B981", headerBg:"rgba(6,78,59,0.35)",  desc:"Needs to be done soon" },
  ];
  const TIERS = tiersOnly ? ALL_TIERS.filter(t => tiersOnly.includes(t.key)) : ALL_TIERS;
  const DEPTS = tasks.map(t => t.role);

  const urgentAsapTotal = tiersOnly
    ? priorityTasks.filter(t => tiersOnly.includes(t.priority) && !t.done).length
    : null;

  function toggleDone(id) {
    setPriorityTasks(prev => prev.map(t => t.id===id ? {...t, done:!t.done} : t));
  }
  function delTask(id) {
    setPriorityTasks(prev => prev.filter(t => t.id!==id));
  }
  async function addTask(priority) {
    if (!form.text.trim()) return;
    const newTask = {
      id: "pt_"+Date.now(),
      text: form.text.trim(),
      dept: form.dept,
      person: form.person.trim(),
      deadline: form.deadline || "",
      notes: form.notes ? form.notes.trim() : "",
      priority,
      done: false,
    };
    setPriorityTasks(prev => [...prev, newTask]);
    setForm({ text:"", dept:"", person:"", deadline:"", notes:"" });
    setShowAdd(null);
    // Fire Telegram notification for URGENT tasks
    if (priority === "urgent") {
      try {
        await sb.functions.invoke("notify-urgent-task", {
          body: { text: newTask.text, person: newTask.person, dept: newTask.dept },
        });
      } catch(e) { console.warn("Telegram notify failed:", e.message); }
    }
  }

  // ── Shared add-task modal (used in both modes) ──────────
  const AddModal = () => !showAdd ? null : (
    <Modal
      title={`Add ${showAdd==="urgent"?"🔴 URGENT":showAdd==="asap"?"🟡 ASAP":"🟢 NORMAL"} Task`}
      onClose={() => setShowAdd(null)}>
      <Field label="TASK">
        <input style={inp} autoFocus value={form.text}
          onChange={e => setForm(f=>({...f,text:e.target.value}))}
          onKeyDown={e => e.key==="Enter" && addTask(showAdd)}
          placeholder="What needs to be done?" />
      </Field>
      <div className="form-grid">
        <Field label="DEPARTMENT">
          <select style={inp} value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>
            <option value="">— Select —</option>
            {DEPTS.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </Field>
        <Field label="ASSIGNED TO">
          <input style={inp} value={form.person}
            onChange={e=>setForm(f=>({...f,person:e.target.value}))}
            placeholder="Person's name" />
        </Field>
        <Field label="DEADLINE">
          <input type="date" style={inp} value={form.deadline||""}
            onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} />
        </Field>
      </div>
      <Field label="NOTES">
        <textarea style={{...inp, minHeight:60, resize:"vertical"}} value={form.notes||""}
          onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
          placeholder="Optional notes…" />
      </Field>
      <div style={{ display:"flex", gap:8, marginTop:20, justifyContent:"flex-end" }}>
        <button onClick={()=>setShowAdd(null)}
          style={{ padding:"8px 16px", borderRadius:8, border:"1px solid var(--border-hi)", background:"none", color:"#9CA3AF" }}>Cancel</button>
        <button onClick={()=>addTask(showAdd)}
          style={{ padding:"8px 22px", borderRadius:8, border:"none", background:"#1d4ed8", color:"#fff", fontWeight:700 }}>Add Task</button>
      </div>
    </Modal>
  );

  // ══════════════════════════════════════════════════════
  //  PROMINENT MODE — full-width banner above KPI cards
  // ══════════════════════════════════════════════════════
  if (prominent) {
    const urgentAll    = priorityTasks.filter(t => t.priority==="urgent");
    const asapAll      = priorityTasks.filter(t => t.priority==="asap");
    const urgentActive = urgentAll.filter(t => !t.done);
    const asapActive   = asapAll.filter(t => !t.done);

    const openAdd = (tier) => { setShowAdd(tier); setForm({text:"",dept:"",person:"",deadline:"",notes:""}); };

    const addBtn = (tier, label, style) => (
      <button onClick={() => openAdd(tier)}
        style={{ fontSize:12, fontWeight:700, padding:"6px 16px", borderRadius:8, cursor:"pointer", whiteSpace:"nowrap", ...style }}>
        {label}
      </button>
    );

    return (
      <div style={{ marginBottom:16 }}>

        {/* ── URGENT section ── */}
        <div className={urgentActive.length>0 ? "urgent-glow" : ""}
          style={{ borderRadius:14, marginBottom:6,
            border: urgentActive.length>0 ? "2px solid rgba(239,68,68,0.65)" : "1px solid rgba(239,68,68,0.2)",
            background: urgentActive.length>0 ? "rgba(120,20,20,0.45)" : "rgba(25,8,8,0.3)",
            padding:"14px 18px" }}>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: urgentAll.length>0?12:0, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              {urgentActive.length > 0 && <span className="pulse-dot" />}
              <p style={{ fontWeight:900, fontSize: urgentActive.length>0?16:13, color:"#EF4444", letterSpacing:"0.05em" }}>
                {urgentActive.length > 0
                  ? `🚨 URGENT — ${urgentActive.length} TASK${urgentActive.length!==1?"S":""} NEED IMMEDIATE ACTION`
                  : "🔴 URGENT"}
              </p>
              {urgentActive.length === 0 && urgentAll.length === 0 &&
                <span style={{ fontSize:12, color:"rgba(239,68,68,0.45)" }}>No urgent tasks</span>}
            </div>
            {addBtn("urgent", "+ Add Urgent", { background:"#991b1b", border:"1px solid #EF4444", color:"#fca5a5" })}
          </div>

          {[...urgentActive, ...urgentAll.filter(t=>t.done)].map(t => (
            <div key={t.id} className="priority-item" style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 16px", borderRadius:10, marginBottom:6,
              background: t.done?"rgba(0,0,0,0.3)":"rgba(239,68,68,0.13)",
              border:`1px solid ${t.done?"rgba(239,68,68,0.12)":"rgba(239,68,68,0.4)"}`,
              opacity: t.done?0.5:1, transition:"opacity 0.2s" }}>
              <div onClick={()=>toggleDone(t.id)} style={{ width:28, height:28, borderRadius:8,
                border:`2px solid ${t.done?"#EF4444":"rgba(239,68,68,0.7)"}`, background:t.done?"#EF4444":"transparent",
                display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer" }}>
                {t.done && <span style={{ color:"#fff", fontSize:14, fontWeight:900 }}>✓</span>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:17, fontWeight:800, lineHeight:1.3,
                  color: t.done?"#6B7280":"#fff",
                  textDecoration: t.done?"line-through":"none" }}>{t.text}</p>
                <div style={{ display:"flex", gap:8, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                  {t.dept     && <span style={{ fontSize:11, fontWeight:700, background:"rgba(239,68,68,0.2)", color:"#fca5a5", padding:"2px 8px", borderRadius:4 }}>{t.dept}</span>}
                  {t.person   && <span style={{ fontSize:12, color:"#9CA3AF" }}>👤 {t.person}</span>}
                  {t.deadline && <span style={{ fontSize:11, fontWeight:700, color: daysUntil(t.deadline)<=7?"#FCA5A5":"#fcd34d" }}>📅 Due {new Date(t.deadline+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>}
                </div>
                {t.notes && <p style={{ fontSize:12, color:"#9CA3AF", marginTop:5, lineHeight:1.4 }}>{t.notes}</p>}
              </div>
              <button onClick={()=>delTask(t.id)}
                style={{ background:"none", border:"none", color:"rgba(255,255,255,0.25)", fontSize:16, cursor:"pointer", padding:"0 4px", flexShrink:0 }}
                onMouseEnter={e=>{e.target.style.color="#EF4444";}}
                onMouseLeave={e=>{e.target.style.color="rgba(255,255,255,0.25)";}}>✕</button>
            </div>
          ))}
        </div>

        {/* ── ASAP section ── */}
        <div style={{ borderRadius:14,
          border: asapActive.length>0 ? "1px solid rgba(245,158,11,0.55)" : "1px solid rgba(245,158,11,0.18)",
          background: asapActive.length>0 ? "rgba(67,20,7,0.38)" : "rgba(20,10,0,0.22)",
          padding:"12px 18px" }}>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: asapAll.length>0?10:0, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <p style={{ fontWeight:800, fontSize: asapActive.length>0?15:13, color:"#F59E0B", letterSpacing:"0.04em" }}>
                {asapActive.length > 0
                  ? `⚡ ASAP — ${asapActive.length} TASK${asapActive.length!==1?"S":""} DUE TODAY`
                  : "⚡ ASAP"}
              </p>
              {asapActive.length === 0 && asapAll.length === 0 &&
                <span style={{ fontSize:12, color:"rgba(245,158,11,0.4)" }}>No ASAP tasks</span>}
            </div>
            {addBtn("asap", "+ Add Task", { background:"#431407", border:"1px solid #F59E0B", color:"#fcd34d" })}
          </div>

          {[...asapActive, ...asapAll.filter(t=>t.done)].map(t => (
            <div key={t.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 14px", borderRadius:9, marginBottom:5,
              background: t.done?"rgba(0,0,0,0.25)":"rgba(245,158,11,0.09)",
              border:`1px solid ${t.done?"rgba(245,158,11,0.12)":"rgba(245,158,11,0.3)"}`,
              opacity: t.done?0.5:1, transition:"opacity 0.2s" }}>
              <div onClick={()=>toggleDone(t.id)} style={{ width:24, height:24, borderRadius:6,
                border:`2px solid ${t.done?"#F59E0B":"rgba(245,158,11,0.6)"}`, background:t.done?"#F59E0B":"transparent",
                display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer" }}>
                {t.done && <span style={{ color:"#fff", fontSize:12, fontWeight:900 }}>✓</span>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:15, fontWeight:700,
                  color: t.done?"#6B7280":"var(--text)",
                  textDecoration: t.done?"line-through":"none" }}>{t.text}</p>
                <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                  {t.dept     && <span style={{ fontSize:11, fontWeight:600, background:"rgba(245,158,11,0.15)", color:"#fcd34d", padding:"1px 7px", borderRadius:3 }}>{t.dept}</span>}
                  {t.person   && <span style={{ fontSize:11, color:"var(--muted)" }}>👤 {t.person}</span>}
                  {t.deadline && <span style={{ fontSize:11, color:"#fcd34d" }}>📅 Due {new Date(t.deadline+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>}
                </div>
                {t.notes && <p style={{ fontSize:11, color:"var(--muted)", marginTop:4, lineHeight:1.4 }}>{t.notes}</p>}
              </div>
              <button onClick={()=>delTask(t.id)}
                style={{ background:"none", border:"none", color:"rgba(245,158,11,0.3)", fontSize:14, cursor:"pointer", padding:"0 4px", flexShrink:0 }}
                onMouseEnter={e=>{e.target.style.color="#EF4444";}}
                onMouseLeave={e=>{e.target.style.color="rgba(245,158,11,0.3)";}}>✕</button>
            </div>
          ))}
        </div>

        <AddModal />
      </div>
    );
  }

  // ══════════════════════════════════════════════════════
  //  COMPACT CARD MODE (Tasks tab / 3-tier view)
  // ══════════════════════════════════════════════════════
  return (
    <Card>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <p style={{ fontWeight:900, fontSize:15 }}>🎯 Priority Tasks</p>
        {tiersOnly && urgentAsapTotal === 0 && (
          <span style={{ fontSize:11, color:"#10B981", fontWeight:700, background:"#064e3b", padding:"2px 10px", borderRadius:8 }}>✅ All clear</span>
        )}
        {tiersOnly && urgentAsapTotal > 0 && (
          <span style={{ fontSize:11, color:"#EF4444", fontWeight:800, background:"#7f1d1d", padding:"2px 10px", borderRadius:8 }}>
            {urgentAsapTotal} need action
          </span>
        )}
      </div>
      <div style={{ display:"grid", gap:12 }} className={TIERS.length===3?"grid-3col":"grid-2col"}>
        {TIERS.map(tier => {
          const all    = priorityTasks.filter(t => t.priority===tier.key);
          const active = all.filter(t => !t.done);
          const done   = all.filter(t => t.done);
          const sorted = [...active, ...done];
          const isCollapsed = collapsed[tier.key];
          return (
            <div key={tier.key} style={{ background:"var(--bg-subtle)", borderRadius:12, border:`1px solid ${tier.color}44`, overflow:"hidden", display:"flex", flexDirection:"column" }}>
              <div onClick={()=>setCollapsed(prev=>({...prev,[tier.key]:!isCollapsed}))}
                style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", cursor:"pointer", background:tier.headerBg, userSelect:"none" }}
                onMouseEnter={e=>e.currentTarget.style.filter="brightness(1.2)"}
                onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:16 }}>{tier.emoji}</span>
                  <div>
                    <p style={{ fontWeight:900, fontSize:12, color:tier.color, letterSpacing:"0.05em" }}>{tier.label}</p>
                    <p style={{ fontSize:10, color:"var(--muted)", marginTop:1 }}>{tier.desc}</p>
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ background:tier.color+"22", color:tier.color, fontSize:11, fontWeight:800, padding:"2px 8px", borderRadius:10 }}>{active.length}</span>
                  <span style={{ color:"var(--muted)", fontSize:13, fontWeight:700 }}>{isCollapsed?"▸":"▾"}</span>
                </div>
              </div>
              {!isCollapsed && (
                <div style={{ padding:"8px 10px", flex:1 }}>
                  {sorted.length===0 && <p style={{ color:"var(--muted)", fontSize:12, textAlign:"center", padding:"12px 0" }}>No tasks</p>}
                  {sorted.map(t => (
                    <div key={t.id} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"8px 6px", borderRadius:8, marginBottom:2, opacity:t.done?0.4:1, transition:"opacity 0.2s" }}>
                      <div onClick={()=>toggleDone(t.id)} style={{ width:18, height:18, borderRadius:4, border:`2px solid ${t.done?tier.color:"#374151"}`, background:t.done?tier.color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", marginTop:2 }}>
                        {t.done && <span style={{ color:"#fff", fontSize:10, fontWeight:900 }}>✓</span>}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ fontSize:12, fontWeight:600, lineHeight:1.35, color:t.done?"var(--muted)":"var(--text)", textDecoration:t.done?"line-through":"none" }}>{t.text}</p>
                        <div style={{ display:"flex", gap:4, marginTop:3, flexWrap:"wrap" }}>
                          {t.dept     && <span style={{ fontSize:10, background:"var(--border)", color:"var(--muted)", padding:"1px 6px", borderRadius:3, fontWeight:600 }}>{t.dept}</span>}
                          {t.person   && <span style={{ fontSize:10, color:"var(--dim)" }}>👤 {t.person}</span>}
                          {t.deadline && <span style={{ fontSize:10, color: daysUntil(t.deadline)<=7?"#EF4444":"var(--muted)" }}>📅 {new Date(t.deadline+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>}
                        </div>
                        {t.notes && <p style={{ fontSize:10, color:"var(--dim)", marginTop:2, lineHeight:1.3 }}>{t.notes}</p>}
                      </div>
                      <button onClick={()=>delTask(t.id)} style={{ background:"none", border:"none", color:"var(--dim)", fontSize:13, cursor:"pointer", padding:"0 2px", flexShrink:0, opacity:0.4, lineHeight:1 }}
                        onMouseEnter={e=>{e.target.style.opacity=1;e.target.style.color="#EF4444";}}
                        onMouseLeave={e=>{e.target.style.opacity=0.4;e.target.style.color="var(--dim)";}}>✕</button>
                    </div>
                  ))}
                  <button onClick={()=>{setShowAdd(tier.key);setForm({text:"",dept:"",person:"",deadline:"",notes:""}); }}
                    style={{ width:"100%", marginTop:6, padding:"7px 0", border:"1px dashed #374151", borderRadius:8, background:"transparent", color:"var(--dim)", fontSize:11, cursor:"pointer" }}
                    onMouseEnter={e=>{e.target.style.borderColor="#6B7280";e.target.style.color="#9CA3AF";}}
                    onMouseLeave={e=>{e.target.style.borderColor="#374151";e.target.style.color="var(--dim)";}}>+ Add task</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <AddModal />
    </Card>
  );
}

function TasksTab({ tasks, setTasks, priorityTasks, setPriorityTasks }) {
  const [sel, setSel] = useState(0);
  const [newText, setNewText] = useState("");
  const [newNotes, setNewNotes] = useState("");
  const [newPriority, setNewPriority] = useState("normal");
  const [adding, setAdding] = useState(false);
  const [newRole, setNewRole] = useState("");
  const [addingRole, setAddingRole] = useState(false);

  function toggle(pIdx, id) {
    setTasks(prev=>prev.map((p,i)=>i!==pIdx?p:{ ...p, tasks:p.tasks.map(t=>t.id===id?{...t,done:!t.done}:t) }));
  }
  function del(pIdx, id) {
    setTasks(prev=>prev.map((p,i)=>i!==pIdx?p:{ ...p, tasks:p.tasks.filter(t=>t.id!==id) }));
  }
  function addTask() {
    if (!newText.trim()) return;
    setTasks(prev=>prev.map((p,i)=>i!==sel?p:{ ...p, tasks:[...p.tasks,{ id:"t_"+Date.now(), text:newText.trim(), notes:newNotes.trim(), priority:newPriority, done:false }] }));
    setNewText(""); setNewNotes(""); setNewPriority("normal"); setAdding(false);
  }
  function addRole() {
    if (!newRole.trim()) return;
    const colors=["#3B82F6","#10B981","#F59E0B","#8B5CF6","#EF4444","#06B6D4","#EC4899"];
    setTasks(prev=>[...prev,{ role:newRole.trim(), color:colors[prev.length%colors.length], emoji:"👤", tasks:[] }]);
    setNewRole(""); setAddingRole(false);
  }

  const cp = tasks[sel];
  const done = cp ? cp.tasks.filter(t=>t.done).length : 0;

  return (
    <div>
      {/* ── Priority tasks panel at top of Tasks tab ── */}
      <TaskPriorityPanel
        priorityTasks={priorityTasks}
        setPriorityTasks={setPriorityTasks}
        tasks={tasks}
      />

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <p style={{ fontWeight:900, fontSize:16 }}>✅ Team Task Board</p>
        <button onClick={()=>setAddingRole(true)} style={{ fontSize:12, padding:"6px 12px", background:"var(--bg-subtle)", border:"1px solid var(--border-hi)", color:"#9CA3AF", borderRadius:8 }}>+ Add Role</button>
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:12, overflowX:"auto", paddingBottom:4, WebkitOverflowScrolling:"touch" }}>
        {tasks.map((p,i) => {
          const d=p.tasks.filter(t=>t.done).length;
          const pct=p.tasks.length?(d/p.tasks.length)*100:0;
          return (
            <button key={i} onClick={()=>setSel(i)} style={{ borderRadius:12, padding:"10px 14px", border: i===sel?`2px solid ${p.color}`:"1px solid var(--border)", background: i===sel?p.color+"18":"var(--bg-card)", textAlign:"left", minWidth:110, flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:4, marginBottom:4 }}>
                <span style={{ fontSize:14 }}>{p.emoji}</span>
                <span style={{ fontSize:12, fontWeight:700, color: i===sel?p.color:"var(--muted)" }}>{p.role}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ flex:1, height:4, background:"var(--bg-subtle)", borderRadius:2 }}>
                  <div style={{ width:pct+"%", height:4, background:p.color, borderRadius:2 }} />
                </div>
                <span style={{ fontSize:10, color:"var(--dim)" }}>{d}/{p.tasks.length}</span>
              </div>
            </button>
          );
        })}
      </div>

      {cp && (
        <Card>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:28 }}>{cp.emoji}</span>
              <div>
                <p style={{ fontWeight:900, color:cp.color, fontSize:16 }}>{cp.role}</p>
                <p style={{ fontSize:12, color:"var(--muted)" }}>Click tasks to complete</p>
              </div>
            </div>
            <span style={{ fontSize:28, fontWeight:900, color:cp.color }}>{done}/{cp.tasks.length}</span>
          </div>

          {cp.tasks.map(t=>{
            const pBadge = t.priority==="urgent" ? { emoji:"🔴", label:"URGENT", bg:"rgba(239,68,68,0.15)", color:"#fca5a5" }
                         : t.priority==="asap"   ? { emoji:"🟡", label:"ASAP",   bg:"rgba(245,158,11,0.15)", color:"#fcd34d" }
                         : null;
            return (
            <div key={t.id} onClick={()=>toggle(sel,t.id)}
              style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"10px 8px", borderRadius:8, cursor:"pointer", marginBottom:2 }}
              onMouseEnter={e=>e.currentTarget.style.background="#1f2937"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{ width:24, height:24, borderRadius:6, border:`2px solid ${t.done?cp.color:"#374151"}`, background:t.done?cp.color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                {t.done && <span style={{ color:"#fff", fontSize:13 }}>✓</span>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                  <span style={{ fontSize:14, color:t.done?"#4B5563":"#e5e7eb", textDecoration:t.done?"line-through":"none" }}>{t.text}</span>
                  {pBadge && <span style={{ fontSize:10, fontWeight:700, background:pBadge.bg, color:pBadge.color, padding:"1px 6px", borderRadius:4 }}>{pBadge.emoji} {pBadge.label}</span>}
                </div>
                {t.notes && <p style={{ fontSize:11, color:"var(--muted)", marginTop:3, lineHeight:1.35, whiteSpace:"pre-line" }}>{t.notes}</p>}
              </div>
              <button onClick={e=>{ e.stopPropagation(); del(sel,t.id); }}
                style={{ opacity:0.3, border:"none", background:"none", color:"var(--muted)", fontSize:16, padding:4, flexShrink:0 }}
                onMouseEnter={e=>{e.target.style.opacity=1;e.target.style.color="#EF4444";}}
                onMouseLeave={e=>{e.target.style.opacity=0.3;e.target.style.color="#6B7280";}}>✕</button>
            </div>

          })}

          {adding ? (
            <div style={{ marginTop:10, background:"var(--bg-subtle)", borderRadius:10, padding:"12px 14px", border:"1px solid var(--border)" }}>
              <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Task title..." autoFocus style={{...inp, marginBottom:8}} />
              <textarea value={newNotes} onChange={e=>setNewNotes(e.target.value)} placeholder="Notes / requirements (optional)..." rows={2} style={{...inp, resize:"vertical", minHeight:52, marginBottom:10}} />
              <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                {[{key:"normal",emoji:"🟢",label:"NORMAL"},{key:"asap",emoji:"🟡",label:"ASAP"},{key:"urgent",emoji:"🔴",label:"URGENT"}].map(p=>(
                  <button key={p.key} onClick={()=>setNewPriority(p.key)}
                    style={{ flex:1, padding:"7px 4px", borderRadius:8, border: newPriority===p.key ? `2px solid ${p.key==="urgent"?"#EF4444":p.key==="asap"?"#F59E0B":"#10B981"}` : "1px solid var(--border-hi)",
                      background: newPriority===p.key ? (p.key==="urgent"?"rgba(239,68,68,0.18)":p.key==="asap"?"rgba(245,158,11,0.18)":"rgba(16,185,129,0.18)") : "transparent",

  );
}

//  ADMIN TAB — access requests management

function AdminTab() {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [busy, setBusy]         = useState(null); // request id currently being acted on
  const [msg, setMsg]           = useState("");

  async function load() {
    setLoading(true);
    const { data, error } = await sb.from("user_requests").select("*").order("created_at", { ascending: false });
    if (!error) setRequests(data || []);
    setLoading(false);
  }

  useEffect(() => { load(); }, []);

  async function approve(req) {
    setBusy(req.id); setMsg("");
    try {
      const { data, error } = await sb.functions.invoke("approve-user-request", {
        body: { request_id: req.id, email: req.email, full_name: req.full_name, role: req.role_requested },
      });
      if (error || data?.error) {
        setMsg("❌ " + (error?.message || data?.error));
      } else {
        setMsg(`✅ Account created for ${req.email} — they'll receive a password-setup email.`);
        setRequests(prev => prev.map(r => r.id === req.id ? { ...r, status:"approved" } : r));
      }
    } catch(e) {
      setMsg("❌ " + e.message);
    }
    setBusy(null);
  }

  async function reject(req) {
    setBusy(req.id); setMsg("");
    const { error } = await sb.from("user_requests").update({ status:"rejected" }).eq("id", req.id);
    if (error) setMsg("❌ " + error.message);
    else setRequests(prev => prev.map(r => r.id === req.id ? { ...r, status:"rejected" } : r));
    setBusy(null);
  }

  const pending  = requests.filter(r => r.status === "pending");
  const reviewed = requests.filter(r => r.status !== "pending");

  const statusBadge = (s) => {
    const map = { pending:["#F59E0B","#7c2d12"], approved:["#10B981","#064e3b"], rejected:["#EF4444","#7f1d1d"] };
    const [color, bg] = map[s] || ["#6B7280","#111827"];
    return <span style={{ fontSize:11, fontWeight:700, color, background:bg+"88", padding:"2px 8px", borderRadius:6, textTransform:"uppercase" }}>{s}</span>;
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <div>
          <p style={{ fontWeight:900, fontSize:18 }}>🔐 Access Requests</p>
          <p style={{ color:"var(--muted)", fontSize:12, marginTop:2 }}>Review and approve or reject dashboard access requests</p>
        </div>
        <button onClick={load} style={{ padding:"6px 14px", borderRadius:8, border:"1px solid var(--border-hi)", background:"var(--bg-subtle)", color:"var(--muted)", fontSize:12, fontWeight:700 }}>↻ Refresh</button>
      </div>

      {msg && (
        <div style={{ padding:"10px 16px", borderRadius:10, marginBottom:16, background: msg.startsWith("✅") ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)", border:`1px solid ${msg.startsWith("✅")?"#10B981":"#EF4444"}44` }}>
          <p style={{ fontSize:13, color: msg.startsWith("✅") ? "#34d399" : "#fca5a5" }}>{msg}</p>
        </div>
      )}

      {loading ? (
        <p style={{ color:"var(--muted)", padding:32, textAlign:"center" }}>Loading requests…</p>
      ) : pending.length === 0 && reviewed.length === 0 ? (
        <Card><p style={{ color:"var(--muted)", textAlign:"center", padding:24 }}>No access requests yet.</p></Card>
      ) : (
        <>
          {/* ── Pending ── */}
          {pending.length > 0 && (
            <Card style={{ marginBottom:16 }}>
              <p style={{ fontWeight:800, fontSize:13, marginBottom:12, color:"#F59E0B" }}>⏳ Pending ({pending.length})</p>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", fontSize:13 }}>
                  <thead>
                    <tr style={{ color:"var(--muted)", fontSize:11, textTransform:"uppercase", textAlign:"left" }}>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Name</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Email</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Role Requested</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Submitted</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {pending.map(r => (
                      <tr key={r.id} style={{ borderTop:"1px solid var(--border)" }}>
                        <td style={{ padding:"10px 10px", fontWeight:700 }}>{r.full_name}</td>
                        <td style={{ padding:"10px 10px", color:"var(--muted)" }}>{r.email}</td>
                        <td style={{ padding:"10px 10px" }}>
                          <span style={{ background:"rgba(99,102,241,0.15)", color:"#a5b4fc", fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:5 }}>{r.role_requested}</span>
                        </td>
                        <td style={{ padding:"10px 10px", color:"var(--muted)", fontSize:11 }}>
                          {new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                        </td>
                        <td style={{ padding:"10px 10px" }}>
                          <div style={{ display:"flex", gap:6 }}>
                            <button
                              disabled={busy === r.id}
                              onClick={() => approve(r)}
                              style={{ padding:"5px 14px", borderRadius:7, border:"none", background: busy===r.id?"#064e3b":"#10B981", color:"#fff", fontWeight:700, fontSize:12, cursor: busy===r.id?"not-allowed":"pointer" }}>
                              {busy === r.id ? "…" : "✓ Approve"}
                            </button>
                            <button
                              disabled={busy === r.id}
                              onClick={() => reject(r)}
                              style={{ padding:"5px 14px", borderRadius:7, border:"1px solid #EF4444", background:"transparent", color:"#EF4444", fontWeight:700, fontSize:12, cursor: busy===r.id?"not-allowed":"pointer" }}>
                              ✕ Reject
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          {/* ── Reviewed ── */}
          {reviewed.length > 0 && (
            <Card>
              <p style={{ fontWeight:800, fontSize:13, marginBottom:12, color:"var(--muted)" }}>History ({reviewed.length})</p>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", fontSize:13 }}>
                  <thead>
                    <tr style={{ color:"var(--muted)", fontSize:11, textTransform:"uppercase", textAlign:"left" }}>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Name</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Email</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Role</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Status</th>
                      <th style={{ padding:"6px 10px", fontWeight:700 }}>Date</th>
                    </tr>
                  </thead>
                  <tbody>
                    {reviewed.map(r => (
                      <tr key={r.id} style={{ borderTop:"1px solid var(--border)", opacity:0.7 }}>
                        <td style={{ padding:"8px 10px" }}>{r.full_name}</td>
                        <td style={{ padding:"8px 10px", color:"var(--muted)" }}>{r.email}</td>
                        <td style={{ padding:"8px 10px", color:"var(--muted)" }}>{r.role_requested}</td>
                        <td style={{ padding:"8px 10px" }}>{statusBadge(r.status)}</td>
                        <td style={{ padding:"8px 10px", color:"var(--muted)", fontSize:11 }}>
                          {new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </>
      )}
    </div>
  );
}

const AGENT_KEY = "demo-key-123";

  { name:"acquisition", label:"Acquisition Agent",  icon:"🔍", desc:"New partner research, lane gap analysis", trigger:"scheduled", schedule:"Monday 7:00 AM" },
];

async function agentAPI(path, opts = {}) {
  const res = await fetch(AGENT_API + path, {
    method: opts.method || "GET",
    headers: { "x-api-key": AGENT_KEY, "Content-Type": "application/json" },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error("API " + res.status);
  return res.json();
}

    // Stats row
    stats && React.createElement(Card, { style:{ marginBottom:16 } },
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(100px, 1fr))", gap:12 } },
        statBadge(stats.drivers?.total || 0, "Drivers", "#e5e7eb"),
        statBadge(stats.loads?.pipeline?.filter(p=>["assigned","dispatched","in_transit"].includes(p.status)).reduce((s,p)=>s+p.count,0) || 0, "Active Loads", "#3b82f6"),
        statBadge("$" + Number(stats.loads?.totals?.total_revenue || 0).toLocaleString(), "Revenue", "#f59e0b"),
        statBadge("$" + Number(stats.loads?.totals?.total_margin || 0).toLocaleString(), "Margin", "#10b981"),
        statBadge((compAlerts?.expired?.count||0) + (compAlerts?.expiring_30_days?.count||0), "Alerts", "#ef4444"),
        statBadge(approvals.length, "Approvals", "#8b5cf6"),
        statBadge(comms.length, "Messages", "#6b7280"),
        statBadge(pipeline?.pipeline?.reduce((s,p)=>s+p.count,0)||0, "Prospects", "#f97316")
      )
    ),

    // Sub-tabs
    React.createElement("div", { className:"subnav-row" },
      SUB_TABS.map(t => React.createElement("button", {
        key: t.id, className:"subnav-btn",
        onClick: () => setSubTab(t.id),
        style:{ padding:"6px 14px", borderRadius:8, fontSize:12, fontWeight:700, border:"none", cursor:"pointer",
          background: subTab===t.id ? "#1d4ed8" : "transparent", color: subTab===t.id ? "#fff" : "var(--muted)" }
      }, t.label))
    ),

    // === CONTROL TAB ===
    subTab === "control" && React.createElement("div", null,

      // Pyramid layout — renders one agent card
      // Row 1: Boss (1 card, centered)
      // Row 2: Dispatch + Outreach (2 cards)
      // Row 3: Load Update + Compliance + Acquisition (3 cards)

      // Helper to render a single agent card
      ...(() => {
        const PYRAMID = [
          { agents: ["boss"],                          cols: "1fr", label: "ORCHESTRATOR" },
          { agents: ["dispatch", "outreach"],           cols: "1fr 1fr", label: "MID-LAYER" },
          { agents: ["load_update", "compliance", "acquisition"], cols: "1fr 1fr 1fr", label: "WORKERS" },
        ];

        const renderCard = (a) => {
          const isRunning = runningAgent === a.name;
          const lastRun = agentStatuses.find(s => s.agent === a.name);
          return React.createElement(Card, { key: a.name, style: { borderColor: isRunning ? "#3b82f6" : "var(--border)", transition: "all 0.2s" } },
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
              React.createElement("div", null,
                React.createElement("p", { style: { fontWeight: 700, fontSize: 14, marginBottom: 4 } }, a.icon + " " + a.label),
                React.createElement("p", { style: { fontSize: 11, color: "var(--muted)", marginBottom: 6 } }, a.desc),
                React.createElement("p", { style: { fontSize: 10, color: "var(--dim)" } }, "Schedule: " + a.schedule),
                lastRun?.last_run && React.createElement("p", { style: { fontSize: 10, color: lastRun.last_success ? "#10b981" : "#ef4444", marginTop: 4 } },
                  "Last: " + lastRun.last_action + " (" + (lastRun.last_tokens || 0) + " tokens)")
              ),
              React.createElement("button", {
                onClick: () => runAgent(a.name, a.trigger), disabled: isRunning,
                style: { padding: "6px 16px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700, cursor: isRunning ? "not-allowed" : "pointer",
                  background: isRunning ? "#1e3a5f" : "#f59e0b", color: isRunning ? "#60a5fa" : "#000", opacity: isRunning ? 0.7 : 1 }
              }, isRunning ? "Running..." : "▶ Run")
            )
          );
        };

        const rows = PYRAMID.map((row, ri) =>
          React.createElement("div", { key: ri, style: { position: "relative", marginBottom: ri < 2 ? 0 : 16 } },
            // Tier label
            React.createElement("div", { style: { textAlign: "center", marginBottom: 6 } },
              React.createElement("span", { style: { fontSize: 9, fontWeight: 700, letterSpacing: "0.12em", color: ri === 0 ? "#f59e0b" : ri === 1 ? "#3b82f6" : "var(--dim)", textTransform: "uppercase" } }, row.label)
            ),
            // Cards
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: row.cols, gap: 12, maxWidth: ri === 0 ? 420 : ri === 1 ? 700 : "100%", margin: "0 auto" } },
              row.agents.map(name => {
                const a = AGENT_DEFS.find(d => d.name === name);
                return a ? renderCard(a) : null;
              })
            ),
            // Connector lines (visual pyramid connectors)
            ri < 2 && React.createElement("div", { style: { textAlign: "center", padding: "6px 0", color: "var(--dim)", fontSize: 18, lineHeight: 1 } },
              ri === 0 ? "┌────────┴────────┐" : "┌──────┴──────┬──────┴──────┐"
            )
          )
        );

        return rows;
      })(),

      // Agent output
      agentOutput && React.createElement(Card, { style:{ marginBottom:16 } },
        React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 } },
          React.createElement("p", { style:{ fontWeight:700, fontSize:13 } }, "Agent Output" +
            (agentMeta ? " — " + agentMeta.turns + " turns, " + agentMeta.tokens + " tokens, " + (agentMeta.time/1000).toFixed(1) + "s" : "")),
          React.createElement("button", { onClick:()=>{ setAgentOutput(null); setAgentMeta(null); },
            style:{ padding:"3px 10px", borderRadius:6, border:"1px solid var(--border-hi)", background:"var(--bg-subtle)", color:"var(--muted)", fontSize:10, fontWeight:700, cursor:"pointer" } }, "✕ Close")
        ),
        agentMeta?.actions?.length > 0 && React.createElement("div", { style:{ marginBottom:10, padding:10, background:"var(--bg-subtle)", borderRadius:8, fontSize:11 } },
          React.createElement("strong", null, "Tools called: "),
          agentMeta.actions.map((ac,i) => React.createElement("span", { key:i, style:{ display:"inline-block", margin:"2px 4px", padding:"2px 8px", borderRadius:4, fontSize:10, fontWeight:600,
            background: ac.success ? "#064e3b" : "#3b1010", color: ac.success ? "#10b981" : "#ef4444" } }, ac.tool))
        ),
        React.createElement("div", { style:{ background:"#0a0a0a", border:"1px solid var(--border)", borderRadius:8, padding:14, fontFamily:"Consolas, monospace", fontSize:12, whiteSpace:"pre-wrap", maxHeight:400, overflowY:"auto", lineHeight:1.7 } }, agentOutput)
      )
    ),

    // === APPROVALS TAB ===
    subTab === "approvals" && React.createElement("div", null,
      approvals.length === 0
        ? React.createElement(Card, null, React.createElement("p", { style:{ textAlign:"center", padding:30, color:"var(--muted)" } }, "No pending approvals — all clear"))
        : approvals.map(a => React.createElement(Card, { key:a.id, style:{ marginBottom:10, borderColor: a.priority==="urgent" ? "#ef4444" : "var(--border)" } },
            React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" } },
              React.createElement("div", { style:{ flex:1 } },
                React.createElement("div", { style:{ display:"flex", gap:8, alignItems:"center", marginBottom:6 } },
                  React.createElement(Badge, { label:a.priority, color: a.priority==="urgent"?"#ef4444":a.priority==="high"?"#f59e0b":"#6b7280", small:true }),
                  React.createElement(Badge, { label:a.agent, color:"#3b82f6", small:true }),
                  React.createElement("span", { style:{ fontSize:10, color:"var(--dim)" } }, a.action_type)
                ),
                React.createElement("p", { style:{ fontWeight:700, fontSize:14, marginBottom:4 } }, a.title),
                React.createElement("p", { style:{ fontSize:12, color:"var(--muted)" } }, a.summary),
                a.full_content && React.createElement("details", { style:{ marginTop:8 } },
                  React.createElement("summary", { style:{ fontSize:11, color:"var(--dim)", cursor:"pointer" } }, "View full content"),
                  React.createElement("pre", { style:{ fontSize:11, marginTop:6, padding:10, background:"var(--bg-subtle)", borderRadius:6, whiteSpace:"pre-wrap", maxHeight:200, overflowY:"auto" } }, a.full_content)
                )
              ),
              React.createElement("div", { style:{ display:"flex", gap:6, marginLeft:12, flexShrink:0 } },
                React.createElement("button", { onClick:()=>handleApproval(a.id,"approved"), style:{ padding:"6px 14px", borderRadius:6, border:"none", fontSize:12, fontWeight:700, cursor:"pointer", background:"#10b981", color:"#fff" } }, "✓ Approve"),
                React.createElement("button", { onClick:()=>handleApproval(a.id,"rejected"), style:{ padding:"6px 14px", borderRadius:6, border:"none", fontSize:12, fontWeight:700, cursor:"pointer", background:"#ef4444", color:"#fff" } }, "✕ Reject")
              )
            )
          ))
    ),

    // === COMMS TAB ===
    subTab === "comms" && React.createElement("div", null,
      comms.length === 0
        ? React.createElement(Card, null, React.createElement("p", { style:{ textAlign:"center", padding:30, color:"var(--muted)" } }, "No communications yet — run an agent to see messages"))
        : React.createElement(Card, null,
            comms.map((c,i) => React.createElement("div", { key:i, style:{ padding:"10px 0", borderBottom: i < comms.length-1 ? "1px solid var(--border)" : "none" } },
              React.createElement("div", { style:{ display:"flex", gap:8, alignItems:"center", marginBottom:4 } },
                React.createElement("span", null, c.channel==="sms"?"💬":c.channel==="email"?"📧":c.channel==="slack"?"🔔":"📝"),
                React.createElement(Badge, { label:c.agent||"system", color:"#3b82f6", small:true }),
                React.createElement(Badge, { label:c.direction, color: c.direction==="outbound"?"#f59e0b":"#10b981", small:true }),
                React.createElement("span", { style:{ fontSize:11, color:"var(--muted)" } }, c.to_addr || ""),
                React.createElement("span", { style:{ fontSize:10, color:"var(--dim)", marginLeft:"auto" } }, new Date(c.created_at).toLocaleString())
              ),
              React.createElement("p", { style:{ fontSize:12, color:"var(--text)", paddingLeft:28 } }, (c.body||"").substring(0, 250) + ((c.body||"").length > 250 ? "..." : ""))
            ))
          )
    ),

    // === COMPLIANCE TAB ===
    subTab === "compliance" && React.createElement("div", null,
      compAlerts && React.createElement(React.Fragment, null,
        compAlerts.expired.count > 0 && React.createElement(Card, { style:{ marginBottom:12, borderColor:"#ef4444" } },
          React.createElement("p", { style:{ fontWeight:700, fontSize:13, color:"#fca5a5", marginBottom:10 } }, "🚨 EXPIRED (" + compAlerts.expired.count + ")"),
          compAlerts.expired.items.map((it,i) => React.createElement("div", { key:i, style:{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderTop: i?"1px solid var(--border)":"none" } },
            React.createElement("div", null,
              React.createElement("strong", null, it.first_name + " " + it.last_name),
              React.createElement("span", { style:{ marginLeft:8 } }, React.createElement(Badge, { label:it.item_type, color:"#ef4444", small:true }))
            ),
            React.createElement("span", { style:{ fontSize:11, color:"var(--dim)" } }, "Expired: " + it.expiry_date)
          ))
        ),
        compAlerts.expiring_30_days.count > 0 && React.createElement(Card, { style:{ marginBottom:12, borderColor:"#f59e0b" } },
          React.createElement("p", { style:{ fontWeight:700, fontSize:13, color:"#fcd34d", marginBottom:10 } }, "⚠️ EXPIRING SOON (" + compAlerts.expiring_30_days.count + ")"),
          compAlerts.expiring_30_days.items.map((it,i) => React.createElement("div", { key:i, style:{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderTop: i?"1px solid var(--border)":"none" } },
            React.createElement("div", null,
              React.createElement("strong", null, it.first_name + " " + it.last_name),
              React.createElement("span", { style:{ marginLeft:8 } }, React.createElement(Badge, { label:it.item_type, color:"#f59e0b", small:true }))
            ),
            React.createElement("span", { style:{ fontSize:11, color:"var(--dim)" } }, "Expires: " + it.expiry_date)
          ))
        ),
        compAlerts.expired.count === 0 && compAlerts.expiring_30_days.count === 0 && React.createElement(Card, null,
          React.createElement("p", { style:{ textAlign:"center", padding:30, color:"#10b981" } }, "✅ All drivers fully compliant — no issues"))
      )
    ),

    // === PIPELINE TAB ===
    subTab === "pipeline" && React.createElement("div", null,
      pipeline && React.createElement(Card, null,
        React.createElement("p", { style:{ fontWeight:700, fontSize:13, marginBottom:12 } }, "Outreach Pipeline"),
        React.createElement("p", { style:{ fontSize:12, color:"var(--muted)", marginBottom:16 } }, "Follow-ups due today: " + (pipeline.followups_due || 0)),
        React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))", gap:10 } },
          (pipeline.pipeline || []).map((p,i) => {
            const colors = { identified:"#6b7280", contacted:"#3b82f6", responded:"#f59e0b", negotiating:"#8b5cf6", onboarded:"#10b981", lost:"#ef4444" };
            return React.createElement("div", { key:i, style:{ textAlign:"center", padding:16, background:"var(--bg-subtle)", borderRadius:10, borderTop:"3px solid "+(colors[p.stage]||"#6b7280") } },
              React.createElement("div", { style:{ fontSize:24, fontWeight:800, color: colors[p.stage]||"var(--text)" } }, p.count),
              React.createElement("div", { style:{ fontSize:11, color:"var(--muted)", marginTop:4 } }, p.stage),
              React.createElement("div", { style:{ fontSize:10, color:"var(--dim)" } }, p.type)
            );
          })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
